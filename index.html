<body>
<div id="app"></div>
<script src="https://cdn.jsdelivr.net/npm/preact@10/dist/preact.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/preact@10/hooks/dist/hooks.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/htm@3/dist/htm.umd.js"></script>
<script>
const {h, render} = preact;
const {useState, useEffect, useRef, useCallback} = preactHooks;
const html = htm.bind(h);

// ... (Constants and Helpers remain unchanged) ...

function App(){
  // Navigation State
  const [tab, setTabInternal] = useState("diary");
  const [view, setViewInternal] = useState("main");

  // WRAPPER FUNCTIONS TO HANDLE HISTORY
  const setTab = (t, isBack = false) => {
    if(!isBack) history.pushState({type: 'tab', value: t}, "");
    setTabInternal(t);
    setViewInternal("main");
  };

  const setView = (v, isBack = false) => {
    if(!isBack) history.pushState({type: 'view', value: v}, "");
    setViewInternal(v);
  };

  // HANDLER FOR BACK SWIPE AND HARDWARE BUTTON
  useEffect(() => {
    // Initialize history state
    history.replaceState({type: 'tab', value: 'diary'}, "");

    const handlePopState = (event) => {
      if (event.state) {
        if (event.state.type === 'tab') {
          setTabInternal(event.state.value);
          setViewInternal("main");
        } else if (event.state.type === 'view') {
          setViewInternal(event.state.value);
        }
      } else {
        // We are at the start of history
        if (confirm("Exit Food Journal?")) {
            window.close(); // Attempt to close the app
        } else {
            // Stay in app: Push the home state back
            history.pushState({type: 'tab', value: 'diary'}, "");
        }
      }
    };

    window.addEventListener('popstate', handlePopState);
    return () => window.removeEventListener('popstate', handlePopState);
  }, []);

  // ... (Rest of your app logic from index.html) ...
  // IMPORTANT: Ensure all your buttons call the new setView() or setTab() 
  // rather than setting the state directly.
}

render(html`<${App}/>`, document.getElementById('app'));
</script>
</body>
</html>
