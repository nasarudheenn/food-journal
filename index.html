<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#0f0e0c"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Food Journal"/>
<meta name="application-name" content="Food Journal"/>
<title>Food Journal</title>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/icon-192.png"/>
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png"/>
<link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:#0f0e0c;color:#f0ece0;font-family:Georgia,'Times New Roman',serif;overscroll-behavior:none;}
  #root{height:100%;}
  input,select,textarea,button{font-family:Georgia,'Times New Roman',serif;}
  ::-webkit-scrollbar{display:none;}
  input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
  #install-banner{
    display:none;position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
    width:calc(100% - 36px);max-width:444px;
    background:linear-gradient(135deg,#e8c547,#b89c2f);
    color:#0f0e0c;border-radius:14px;padding:14px 18px;
    z-index:999;box-shadow:0 4px 24px rgba(232,197,71,0.5);
    display:none;align-items:center;gap:14px;cursor:pointer;border:none;
    font-family:Georgia,serif;
  }
  #install-banner.show{display:flex!important;}
  #install-banner img{width:44px;height:44px;border-radius:10px;flex-shrink:0;}
  #install-banner .txt{flex:1;text-align:left;}
  #install-banner .txt strong{display:block;font-size:14px;font-weight:700;margin-bottom:2px;}
  #install-banner .txt span{font-size:11px;opacity:0.75;}
  #install-banner .arrow{font-size:20px;flex-shrink:0;}
  #install-dismiss{position:absolute;top:8px;right:10px;background:none;border:none;color:#0f0e0c;font-size:16px;cursor:pointer;opacity:0.6;padding:2px 6px;}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ── Storage (localStorage for PWA) ─────────────────────────────────────────
const SK = { entries:"fd-entries-v2", profile:"fd-profile-v2", weights:"fd-weights-v2", recipes:"fd-recipebook-v2" };
const store = {
  get: key => { try { const v=localStorage.getItem(key); return v?JSON.parse(v):null; } catch{ return null; } },
  set: (key,val) => { try { localStorage.setItem(key,JSON.stringify(val)); } catch{} }
};

// ── Constants ───────────────────────────────────────────────────────────────
const DEFAULT_PROFILE = {name:"",currentWeight:"",targetWeight:"",height:"",calorieGoal:1800,protein:130,carbs:180,fat:55,fiber:25};
const C = {bg:"#0f0e0c",card:"#1a1917",border:"#2a2825",accent:"#e8c547",accentDim:"#b89c2f",text:"#f0ece0",muted:"#7a7060",red:"#e05252",green:"#52c47a",blue:"#5299e0",orange:"#e08a52",purple:"#a07ee0"};
const MEAL_TYPES = ["Breakfast","Mid-Morning","Lunch","Evening","Dinner"];
const MEAL_ICONS = {Breakfast:"☀️","Mid-Morning":"🫐",Lunch:"🥗",Evening:"🍎",Dinner:"🌙"};
const MACRO_FIELDS = [{key:"calories",label:"Calories",unit:"kcal",color:C.accent},{key:"protein",label:"Protein",unit:"g",color:C.blue},{key:"carbs",label:"Carbs",unit:"g",color:C.orange},{key:"fat",label:"Fat",unit:"g",color:C.accentDim},{key:"fiber",label:"Fiber",unit:"g",color:C.green}];
const MICRO_FIELDS = [{key:"sodium",label:"Sodium",unit:"mg"},{key:"potassium",label:"Potassium",unit:"mg"},{key:"calcium",label:"Calcium",unit:"mg"},{key:"iron",label:"Iron",unit:"mg"},{key:"vitC",label:"Vit C",unit:"mg"},{key:"vitD",label:"Vit D",unit:"μg"},{key:"vitB12",label:"Vit B12",unit:"μg"},{key:"zinc",label:"Zinc",unit:"mg"}];
const ALL_FIELDS = [...MACRO_FIELDS,...MICRO_FIELDS];
const TABS = [{id:"diary",icon:"📖",label:"Diary"},{id:"recipes",icon:"📚",label:"Recipes"},{id:"reports",icon:"📊",label:"Reports"},{id:"profile",icon:"👤",label:"Profile"}];

// ── Helpers ─────────────────────────────────────────────────────────────────
const todayStr = () => new Date().toISOString().split("T")[0];
const fmtDate = d => new Date(d+"T00:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
const fmtShort = d => new Date(d+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"});
const isoWeek = d => { const dt=new Date(d+"T00:00:00"),j=new Date(dt.getFullYear(),0,1); return Math.ceil(((dt-j)/86400000+j.getDay()+1)/7); };
const isoMonth = d => d.slice(0,7);
const emptyNut = () => Object.fromEntries(ALL_FIELDS.map(f=>[f.key,""]));
const sumE = list => { const o=Object.fromEntries(ALL_FIELDS.map(f=>[f.key,0])); list.forEach(e=>ALL_FIELDS.forEach(f=>{o[f.key]+=(Number(e[f.key])||0);})); return o; };

// ── AI Lookup ───────────────────────────────────────────────────────────────
async function aiLookup(fname,q,u,onRes,onSt) {
  onSt("Looking up…");
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        model:"claude-sonnet-4-20250514", max_tokens:800,
        messages:[{role:"user",content:`Nutrition for ${q} ${u} of ${fname}. Return ONLY JSON: calories(kcal),protein,carbs,fat,fiber(g),sodium,potassium,calcium,iron,vitC(mg),vitD,vitB12,zinc(μg/mg). Numbers only.`}]
      })
    });
    const data = await res.json();
    const txt = data.content?.map(b=>b.text||"").join("")||"";
    const p = JSON.parse(txt.replace(/```json|```/g,"").trim());
    const r = Object.fromEntries(ALL_FIELDS.map(f=>[f.key,String(Math.round((Number(p[f.key])||0)*10)/10)]));
    onRes(r); onSt("✓ Filled — adjust if needed");
  } catch { onSt("Couldn't auto-fill. Enter manually."); }
}

// ── Small Components ────────────────────────────────────────────────────────
const IS = {width:"100%",padding:"10px 12px",background:C.card,border:`1px solid ${C.border}`,borderRadius:9,color:C.text,fontSize:14,fontFamily:"Georgia,serif",outline:"none",boxSizing:"border-box"};

function MacroBar({label,value,goal,color}) {
  const pct=Math.min((value/goal)*100,100),over=value>goal;
  return (
    <div style={{marginBottom:8}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
        <span style={{fontSize:11,color:C.muted,letterSpacing:"0.07em",textTransform:"uppercase"}}>{label}</span>
        <span style={{fontSize:11,color:over?C.red:C.text,fontFamily:"monospace"}}>{Math.round(value)}<span style={{color:C.muted}}>/{goal}</span></span>
      </div>
      <div style={{height:5,background:C.border,borderRadius:3,overflow:"hidden"}}>
        <div style={{height:"100%",width:`${pct}%`,background:over?C.red:color,borderRadius:3,transition:"width 0.5s ease"}}/>
      </div>
    </div>
  );
}

function Badge({label,value,unit,color}) {
  return (
    <div style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 6px",textAlign:"center",flex:1,minWidth:0}}>
      <div style={{fontSize:14,fontWeight:700,color:color||C.text,fontFamily:"monospace",whiteSpace:"nowrap"}}>{Math.round(value)}<span style={{fontSize:9,color:C.muted}}>{unit}</span></div>
      <div style={{fontSize:9,color:C.muted,marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{label}</div>
    </div>
  );
}

function Btn({onClick,disabled,color,children,style={}}) {
  return <button onClick={onClick} disabled={disabled} style={{width:"100%",padding:"13px",borderRadius:10,border:"none",cursor:disabled?"not-allowed":"pointer",background:disabled?C.border:(color||C.green),color:C.bg,fontSize:14,fontWeight:700,fontFamily:"Georgia,serif",opacity:disabled?0.5:1,...style}}>{children}</button>;
}

function Lbl({children}) {
  return <div style={{fontSize:10,color:C.muted,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:6}}>{children}</div>;
}

// ── Weight Chart ────────────────────────────────────────────────────────────
function WeightChart({weights,target}) {
  if (!weights.length) return <div style={{textAlign:"center",padding:"24px 0",color:C.muted,fontSize:13}}>No weight entries yet.</div>;
  const W=320,H=100,P={t:8,r:24,b:20,l:36};
  const vals=weights.map(w=>w.weight),dates=weights.map(w=>w.date);
  const all=target?[...vals,target]:vals;
  const mn=Math.min(...all)-1,mx=Math.max(...all)+1;
  const xOf=i=>P.l+(i/(weights.length-1||1))*(W-P.l-P.r);
  const yOf=v=>P.t+((mx-v)/(mx-mn))*(H-P.t-P.b);
  const pathD=vals.map((v,i)=>`${i===0?"M":"L"}${xOf(i).toFixed(1)},${yOf(v).toFixed(1)}`).join(" ");
  const areaD=`${pathD} L${xOf(vals.length-1).toFixed(1)},${H-P.b} L${xOf(0).toFixed(1)},${H-P.b} Z`;
  const tY=target?yOf(target):null;
  const ticks=weights.length<=5?weights.map((_,i)=>i):[0,Math.floor(weights.length/2),weights.length-1];
  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{display:"block"}}>
      <defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={C.accent} stopOpacity="0.3"/><stop offset="100%" stopColor={C.accent} stopOpacity="0"/></linearGradient></defs>
      {[0,0.5,1].map(t=>{const y=P.t+t*(H-P.t-P.b),v=mx-t*(mx-mn);return(<g key={t}><line x1={P.l} y1={y} x2={W-P.r} y2={y} stroke={C.border} strokeDasharray="3,3"/><text x={P.l-3} y={y+3} fontSize="9" fill={C.muted} textAnchor="end">{Math.round(v)}</text></g>);})}
      {tY&&<><line x1={P.l} y1={tY} x2={W-P.r} y2={tY} stroke={C.green} strokeDasharray="4,3" strokeWidth="1.5"/><text x={W-P.r+2} y={tY+3} fontSize="8" fill={C.green}>Goal</text></>}
      {vals.length>1&&<path d={areaD} fill="url(#wg)"/>}
      {vals.length>1&&<path d={pathD} fill="none" stroke={C.accent} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>}
      {vals.map((v,i)=><circle key={i} cx={xOf(i)} cy={yOf(v)} r="3.5" fill={C.accent}/>)}
      {ticks.map(i=><text key={i} x={xOf(i)} y={H-2} fontSize="8" fill={C.muted} textAnchor="middle">{fmtShort(dates[i])}</text>)}
    </svg>
  );
}

function BarChart({data,goal,color}) {
  if (!data.length) return null;
  const W=320,H=80,P={t:5,r:8,b:20,l:36};
  const vals=data.map(d=>d.value),mx=Math.max(...vals,goal||0,1);
  const bw=Math.max(4,(W-P.l-P.r)/data.length-4);
  const yOf=v=>P.t+((mx-v)/mx)*(H-P.t-P.b);
  const gY=goal?yOf(goal):null;
  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{display:"block"}}>
      {gY&&<line x1={P.l} y1={gY} x2={W-P.r} y2={gY} stroke={C.green} strokeDasharray="4,3" strokeWidth="1"/>}
      {data.map((d,i)=>{
        const x=P.l+i*(W-P.l-P.r)/data.length+((W-P.l-P.r)/data.length-bw)/2;
        const bH=Math.max(1,(H-P.t-P.b)-(yOf(d.value)-P.t));
        return(<g key={i}><rect x={x} y={yOf(d.value)} width={bw} height={bH} rx="2" fill={goal&&d.value>goal?C.red:color} opacity="0.85"/><text x={x+bw/2} y={H-4} fontSize="8" fill={C.muted} textAnchor="middle">{d.label}</text></g>);
      })}
      {[0,0.5,1].map(t=><text key={t} x={P.l-3} y={P.t+t*(H-P.t-P.b)+3} fontSize="8" fill={C.muted} textAnchor="end">{Math.round(mx*(1-t))}</text>)}
    </svg>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
function App() {
  const [entries,    setEntries]    = useState(()=>store.get(SK.entries)||{});
  const [profile,    setProfile]    = useState(()=>store.get(SK.profile)||DEFAULT_PROFILE);
  const [weights,    setWeights]    = useState(()=>store.get(SK.weights)||[]);
  const [recipeBook, setRecipeBook] = useState(()=>store.get(SK.recipes)||[]);

  const [tab,  setTab]  = useState("diary");
  const [view, setView] = useState("main");
  const [selDate, setSelDate] = useState(todayStr());
  const [expR, setExpR] = useState({});

  // Add food
  const [addMeal, setAddMeal] = useState("Breakfast");
  const [foodName,setFoodName]= useState("");
  const [qty,     setQty]     = useState("");
  const [unit,    setUnit]    = useState("g");
  const [nut,     setNut]     = useState(emptyNut());
  const [loading, setLoading] = useState(false);
  const [aiMsg,   setAiMsg]   = useState("");
  const [importMode,setImportMode]=useState(false);
  const [importTxt, setImportTxt] =useState("");
  const [impLoading,setImpLoading]=useState(false);
  const [impStatus, setImpStatus] =useState("");
  const [parsed,    setParsed]    =useState([]);
  const [impName,   setImpName]   =useState("");

  // Profile
  const [profEdit, setProfEdit]=useState(()=>store.get(SK.profile)||DEFAULT_PROFILE);
  const [newWt,    setNewWt]   =useState("");

  // Recipes
  const [editRec,  setEditRec]  =useState(null);
  const [useRec,   setUseRec]   =useState(null);
  const [useQtys,  setUseQtys]  =useState({});
  const [useMeal,  setUseMeal]  =useState("Lunch");
  const [recName,  setRecName]  =useState("");
  const [recItems, setRecItems] =useState([]);
  const [recAiMsg, setRecAiMsg] =useState("");
  const [recLoad,  setRecLoad]  =useState(false);

  // Reports
  const [repPeriod,setRepPeriod]=useState("daily");

  const goals={calories:Number(profile.calorieGoal)||1800,protein:Number(profile.protein)||130,carbs:Number(profile.carbs)||180,fat:Number(profile.fat)||55,fiber:Number(profile.fiber)||25};

  // ── Persist helpers ────────────────────────────────────────────────────
  const pE=d=>{setEntries(d);store.set(SK.entries,d);};
  const pP=d=>{setProfile(d);setProfEdit(d);store.set(SK.profile,d);};
  const pW=d=>{setWeights(d);store.set(SK.weights,d);};
  const pRB=d=>{setRecipeBook(d);store.set(SK.recipes,d);};

  // ── Diary ──────────────────────────────────────────────────────────────
  function addEntry(){
    if(!foodName.trim()||!nut.calories)return;
    const rid=`r_${Date.now()}`;
    const e={id:Date.now(),meal:addMeal,food:foodName.trim(),quantity:`${qty} ${unit}`,
      time:new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"}),
      recipeId:rid,recipeName:foodName.trim(),
      ...Object.fromEntries(ALL_FIELDS.map(f=>[f.key,Number(nut[f.key])||0]))};
    pE({...entries,[selDate]:[...(entries[selDate]||[]),e]});
    setFoodName("");setQty("");setUnit("g");setNut(emptyNut());setAiMsg("");setView("main");
  }

  function addParsed(){
    const toAdd=parsed.filter(i=>i.selected);if(!toAdd.length)return;
    const now=new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});
    const rid=`r_${Date.now()}`,rn=impName.trim()||"Imported Meal";
    const newEs=toAdd.map(x=>({id:Date.now()+Math.random(),meal:addMeal,food:x.food,
      quantity:`${x.quantity} ${x.unit||"g"}`,time:now,recipeId:rid,recipeName:rn,
      ...Object.fromEntries(ALL_FIELDS.map(f=>[f.key,Number(x[f.key])||0]))}));
    pE({...entries,[selDate]:[...(entries[selDate]||[]),...newEs]});
    setImportTxt("");setParsed([]);setImpStatus("");setImpName("");setImportMode(false);setView("main");
  }

  function delEntry(date,id){const u={...entries,[date]:(entries[date]||[]).filter(e=>e.id!==id)};if(!u[date]?.length)delete u[date];pE(u);}
  function delGroup(date,rid){const u={...entries,[date]:(entries[date]||[]).filter(e=>e.recipeId!==rid)};if(!u[date]?.length)delete u[date];pE(u);}
  function togExp(id){setExpR(p=>({...p,[id]:!p[id]}));}

  async function doParse(){
    if(!importTxt.trim())return;
    setImpLoading(true);setImpStatus("Parsing…");setParsed([]);
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
        model:"claude-sonnet-4-20250514",max_tokens:2000,
        messages:[{role:"user",content:`Extract food items + nutrition from text. Return ONLY JSON array. Each: food,quantity(num),unit(default g),calories,protein,carbs,fat,fiber,sodium,potassium,calcium,iron,vitC,vitD,vitB12,zinc (numbers). Estimate missing.\nText:\n${importTxt}`}]
      })});
      const data=await res.json();
      const txt=data.content?.map(b=>b.text||"").join("")||"";
      const p=JSON.parse(txt.replace(/```json|```/g,"").trim());
      if(!Array.isArray(p)||!p.length)throw 0;
      setParsed(p.map((x,i)=>({...x,selected:true,_id:i})));
      setImpStatus(`✓ Found ${p.length} item${p.length>1?"s":""}`);
    }catch{setImpStatus("⚠ Couldn't parse. Try cleaner text.");}
    setImpLoading(false);
  }

  // ── Recipe Book ────────────────────────────────────────────────────────
  function addRI(){setRecItems(p=>[...p,{_id:Date.now(),food:"",quantity:"",unit:"g",...Object.fromEntries(ALL_FIELDS.map(f=>[f.key,""]))}]);}
  function updRI(idx,f,v){setRecItems(p=>p.map((x,i)=>i===idx?{...x,[f]:v}:x));}
  async function aiRI(idx){
    const it=recItems[idx];if(!it.food.trim()||!it.quantity)return;
    setRecLoad(true);
    await aiLookup(it.food,it.quantity,it.unit,r=>setRecItems(p=>p.map((x,i)=>i===idx?{...x,...r}:x)),setRecAiMsg);
    setRecLoad(false);
  }
  function saveRecipe(){
    if(!recName.trim()||!recItems.length)return;
    const rec={id:editRec?.id||`rb_${Date.now()}`,name:recName.trim(),items:recItems};
    pRB(editRec?recipeBook.map(r=>r.id===editRec.id?rec:r):[...recipeBook,rec]);
    setEditRec(null);setRecName("");setRecItems([]);setRecAiMsg("");setView("main");
  }
  function startEdit(r){setEditRec(r);setRecName(r.name);setRecItems(r.items.map((x,i)=>({...x,_id:x._id??i})));setRecAiMsg("");setView("recipe-edit");}
  function startUse(r){setUseRec(r);setUseQtys(Object.fromEntries(r.items.map(x=>[x._id??x.food,x.quantity])));setUseMeal("Lunch");setView("recipe-use");}
  function logRecipe(){
    if(!useRec)return;
    const now=new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});
    const rid=`r_${Date.now()}`;
    const newEs=useRec.items.map(x=>{
      const k=x._id??x.food,oQ=parseFloat(x.quantity)||1,nQ=parseFloat(useQtys[k])||oQ,ratio=nQ/oQ;
      return{id:Date.now()+Math.random(),meal:useMeal,food:x.food,quantity:`${nQ} ${x.unit||"g"}`,time:now,recipeId:rid,recipeName:useRec.name,
        ...Object.fromEntries(ALL_FIELDS.map(f=>[f.key,Math.round((Number(x[f.key])||0)*ratio*10)/10]))};
    });
    pE({...entries,[selDate]:[...(entries[selDate]||[]),...newEs]});
    setUseRec(null);setView("main");setTab("diary");
  }

  // ── Profile ────────────────────────────────────────────────────────────
  function saveProfile(){pP(profEdit);}
  function logWeight(){
    if(!newWt)return;
    const e={date:todayStr(),weight:parseFloat(newWt)};
    const u=[...weights.filter(w=>w.date!==todayStr()),e].sort((a,b)=>a.date.localeCompare(b.date));
    pW(u);
    const np={...profEdit,currentWeight:newWt};pP(np);setNewWt("");
  }

  // ── Computed ───────────────────────────────────────────────────────────
  const dayEs=entries[selDate]||[];
  const dayT=sumE(dayEs);
  const calOver=dayT.calories>goals.calories;
  const calPct=Math.min((dayT.calories/goals.calories)*100,100);

  const mealGroups=MEAL_TYPES.map(m=>{
    const mEs=dayEs.filter(e=>e.meal===m),rm={};
    mEs.forEach(e=>{const rid=e.recipeId||String(e.id);if(!rm[rid])rm[rid]={recipeId:rid,recipeName:e.recipeName||e.food,items:[],time:e.time};rm[rid].items.push(e);});
    return{meal:m,recipes:Object.values(rm)};
  }).filter(g=>g.recipes.length>0);

  const histDates=Object.keys(entries).sort((a,b)=>b.localeCompare(a));

  const repData=(()=>{
    const ad=Object.keys(entries).sort();
    if(repPeriod==="daily")return ad.slice(-14).map(d=>({label:fmtShort(d),totals:sumE(entries[d]||[])}));
    if(repPeriod==="weekly"){
      const bw={};
      ad.forEach(d=>{const wk=`${new Date(d+"T00:00:00").getFullYear()}-W${String(isoWeek(d)).padStart(2,"0")}`;if(!bw[wk])bw[wk]={label:`W${isoWeek(d)}`,dates:[]};bw[wk].dates.push(d);});
      return Object.entries(bw).slice(-12).map(([,v])=>{const all=v.dates.flatMap(d=>entries[d]||[]),t=sumE(all),n=v.dates.length,avg={};ALL_FIELDS.forEach(f=>avg[f.key]=t[f.key]/n);return{label:v.label,totals:avg};});
    }
    const bm={};
    ad.forEach(d=>{const mo=isoMonth(d);if(!bm[mo])bm[mo]={label:new Date(d+"T00:00:00").toLocaleDateString("en-US",{month:"short",year:"2-digit"}),dates:[]};bm[mo].dates.push(d);});
    return Object.entries(bm).slice(-6).map(([,v])=>{const all=v.dates.flatMap(d=>entries[d]||[]),t=sumE(all),n=v.dates.length,avg={};ALL_FIELDS.forEach(f=>avg[f.key]=t[f.key]/n);return{label:v.label,totals:avg};});
  })();

  const pageTitle=view==="recipe-edit"?(editRec?"Edit Recipe":"New Recipe"):view==="recipe-use"?"Use Recipe":view==="add"?"Log Food":view==="history"?"History":tab==="diary"?fmtDate(selDate):tab==="profile"?"My Profile":tab==="recipes"?"Recipe Book":"Reports";

  // ── RENDER ─────────────────────────────────────────────────────────────
  return (
    <div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"Georgia,serif",maxWidth:480,margin:"0 auto",paddingBottom:80}}>

      {/* HEADER */}
      <div style={{padding:"env(safe-area-inset-top, 18px) 18px 10px",paddingTop:"max(env(safe-area-inset-top), 18px)",borderBottom:`1px solid ${C.border}`,position:"sticky",top:0,background:C.bg,zIndex:10}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{fontSize:9,color:C.accent,letterSpacing:"0.15em",textTransform:"uppercase",marginBottom:1}}>Food Journal</div>
            <div style={{fontSize:20,fontWeight:700,letterSpacing:"-0.02em"}}>{pageTitle}</div>
          </div>
          <div style={{display:"flex",gap:6}}>
            {view!=="main"&&<button onClick={()=>setView("main")} style={{background:"none",border:`1px solid ${C.border}`,color:C.muted,borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:13}}>← Back</button>}
            {tab==="diary"&&view==="main"&&<button onClick={()=>setView("history")} style={{background:"none",border:`1px solid ${C.border}`,color:C.muted,borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:13}}>📅</button>}
          </div>
        </div>
        {tab==="diary"&&view==="main"&&(
          <div style={{display:"flex",gap:5,marginTop:10,overflowX:"auto",paddingBottom:2}}>
            {[-2,-1,0,1].map(offset=>{
              const d=new Date();d.setDate(d.getDate()+offset);
              const ds=d.toISOString().split("T")[0];
              const lbl=offset===0?"Today":offset===-1?"Yest":d.toLocaleDateString("en-US",{weekday:"short"});
              return(
                <button key={ds} onClick={()=>setSelDate(ds)} style={{flex:"0 0 auto",padding:"6px 14px",borderRadius:20,fontSize:11,cursor:"pointer",fontFamily:"inherit",border:`1px solid ${selDate===ds?C.accent:C.border}`,background:selDate===ds?C.accent:"none",color:selDate===ds?C.bg:C.muted,fontWeight:selDate===ds?700:400,position:"relative"}}>
                  {lbl}
                  {entries[ds]?.length>0&&selDate!==ds&&<span style={{position:"absolute",top:2,right:3,width:5,height:5,borderRadius:"50%",background:C.green}}/>}
                </button>
              );
            })}
          </div>
        )}
      </div>

      {/* ── DIARY MAIN ── */}
      {tab==="diary"&&view==="main"&&(
        <div style={{padding:"14px 18px"}}>
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:18,marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:16}}>
              <div style={{position:"relative",width:70,height:70,flexShrink:0}}>
                <svg width="70" height="70" style={{transform:"rotate(-90deg)"}}>
                  <circle cx="35" cy="35" r="28" fill="none" stroke={C.border} strokeWidth="5"/>
                  <circle cx="35" cy="35" r="28" fill="none" stroke={calOver?C.red:C.accent} strokeWidth="5"
                    strokeDasharray={`${2*Math.PI*28}`} strokeDashoffset={`${2*Math.PI*28*(1-calPct/100)}`}
                    strokeLinecap="round" style={{transition:"stroke-dashoffset 0.6s ease"}}/>
                </svg>
                <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
                  <span style={{fontSize:13,fontWeight:700,color:calOver?C.red:C.text,fontFamily:"monospace",lineHeight:1}}>{Math.round(dayT.calories)}</span>
                  <span style={{fontSize:9,color:C.muted}}>kcal</span>
                </div>
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:12,color:C.muted,marginBottom:8}}>{calOver?<span style={{color:C.red}}>+{Math.round(dayT.calories-goals.calories)} over goal</span>:<span>{Math.round(goals.calories-dayT.calories)} kcal remaining</span>}</div>
                <MacroBar label="Protein" value={dayT.protein} goal={goals.protein} color={C.blue}/>
                <MacroBar label="Carbs" value={dayT.carbs} goal={goals.carbs} color={C.orange}/>
                <MacroBar label="Fat" value={dayT.fat} goal={goals.fat} color={C.accentDim}/>
              </div>
            </div>
            <div style={{display:"flex",gap:5,marginTop:12}}>
              {[{label:"Protein",value:dayT.protein,unit:"g",color:C.blue},{label:"Carbs",value:dayT.carbs,unit:"g",color:C.orange},{label:"Fat",value:dayT.fat,unit:"g",color:C.accentDim},{label:"Fiber",value:dayT.fiber,unit:"g",color:C.green}].map(b=><Badge key={b.label} {...b}/>)}
            </div>
          </div>
          {mealGroups.length===0?(
            <div style={{textAlign:"center",padding:"40px 20px",color:C.muted,fontSize:15,lineHeight:1.8}}><div style={{fontSize:40,marginBottom:12}}>🍽️</div>No meals logged yet.<br/>Tap + to add food.</div>
          ):mealGroups.map(({meal,recipes})=>{
            const mCal=recipes.reduce((s,r)=>s+r.items.reduce((ss,e)=>ss+e.calories,0),0);
            return(
              <div key={meal} style={{marginBottom:18}}>
                <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:8,fontSize:11,color:C.muted,letterSpacing:"0.08em",textTransform:"uppercase"}}>
                  <span>{MEAL_ICONS[meal]}</span><span>{meal}</span><span style={{color:C.border}}>—</span><span style={{fontFamily:"monospace"}}>{Math.round(mCal)} kcal</span>
                </div>
                {recipes.map(recipe=>{
                  const rt=sumE(recipe.items),isExp=!!expR[recipe.recipeId],isMulti=recipe.items.length>1;
                  return(
                    <div key={recipe.recipeId} style={{background:C.card,border:`1px solid ${isExp?C.accent+"55":C.border}`,borderRadius:14,marginBottom:9,overflow:"hidden"}}>
                      <div onClick={()=>isMulti&&togExp(recipe.recipeId)} style={{padding:"13px 14px",display:"flex",alignItems:"center",gap:10,cursor:isMulti?"pointer":"default"}}>
                        {isMulti&&<div style={{width:18,height:18,borderRadius:5,flexShrink:0,background:isExp?C.accent+"22":C.border+"55",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:isExp?C.accent:C.muted,transform:isExp?"rotate(90deg)":"none",transition:"transform 0.2s"}}>▶</div>}
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:14,fontWeight:600,marginBottom:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{recipe.recipeName}</div>
                          <div style={{fontSize:11,color:C.muted}}>{isMulti?`${recipe.items.length} ingredients`:recipe.items[0]?.quantity} · {recipe.time}</div>
                          <div style={{display:"flex",gap:8,marginTop:4}}>
                            <span style={{fontSize:13,color:C.accent,fontFamily:"monospace",fontWeight:700}}>{Math.round(rt.calories)} kcal</span>
                            <span style={{fontSize:11,color:C.muted}}>P:{Math.round(rt.protein)}g</span>
                            <span style={{fontSize:11,color:C.muted}}>C:{Math.round(rt.carbs)}g</span>
                            <span style={{fontSize:11,color:C.muted}}>F:{Math.round(rt.fat)}g</span>
                          </div>
                        </div>
                        <button onClick={e=>{e.stopPropagation();delGroup(selDate,recipe.recipeId);}} style={{background:"none",border:"none",color:C.border,cursor:"pointer",fontSize:18,padding:4,flexShrink:0,lineHeight:1}}>✕</button>
                      </div>
                      {isMulti&&isExp&&(
                        <div style={{borderTop:`1px solid ${C.border}`,background:C.bg}}>
                          {recipe.items.map((entry,idx)=>(
                            <div key={entry.id} style={{padding:"10px 14px",display:"flex",alignItems:"center",gap:10,borderBottom:idx<recipe.items.length-1?`1px solid ${C.border}`:"none"}}>
                              <div style={{width:6,height:6,borderRadius:"50%",background:C.accent+"88",flexShrink:0}}/>
                              <div style={{flex:1}}>
                                <div style={{fontSize:13,fontWeight:500}}>{entry.food}</div>
                                <div style={{fontSize:11,color:C.muted,marginTop:2}}>{entry.quantity} · <span style={{fontFamily:"monospace"}}>{entry.calories} kcal</span> · P:{entry.protein}g C:{entry.carbs}g F:{entry.fat}g</div>
                              </div>
                              <button onClick={()=>delEntry(selDate,entry.id)} style={{background:"none",border:"none",color:C.border,cursor:"pointer",fontSize:15,padding:3}}>✕</button>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>
      )}

      {/* ── ADD FOOD ── */}
      {tab==="diary"&&view==="add"&&(
        <div style={{padding:"16px 18px"}}>
          <div style={{display:"flex",background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:3,marginBottom:16,gap:3}}>
            {[{label:"✏️ Manual / AI",v:false},{label:"📋 Paste from Claude",v:true}].map(({label,v})=>(
              <button key={String(v)} onClick={()=>{setImportMode(v);setAiMsg("");setImpStatus("");}} style={{flex:1,padding:"9px 5px",borderRadius:7,border:"none",cursor:"pointer",background:importMode===v?C.accent:"none",color:importMode===v?C.bg:C.muted,fontSize:12,fontFamily:"inherit",fontWeight:importMode===v?700:400}}>{label}</button>
            ))}
          </div>
          <div style={{marginBottom:14}}>
            <Lbl>Meal</Lbl>
            <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
              {MEAL_TYPES.map(m=><button key={m} onClick={()=>setAddMeal(m)} style={{padding:"7px 14px",borderRadius:20,fontSize:12,cursor:"pointer",fontFamily:"inherit",border:`1px solid ${addMeal===m?C.accent:C.border}`,background:addMeal===m?C.accent:"none",color:addMeal===m?C.bg:C.muted,fontWeight:addMeal===m?700:400}}>{MEAL_ICONS[m]} {m}</button>)}
            </div>
          </div>
          {!importMode&&(
            <div>
              <div style={{marginBottom:10}}><Lbl>Food Name</Lbl><input value={foodName} onChange={e=>{setFoodName(e.target.value);setAiMsg("");}} placeholder="e.g. Grilled chicken…" style={IS}/></div>
              <div style={{display:"flex",gap:8,marginBottom:12}}>
                <div style={{flex:2}}><Lbl>Amount</Lbl><input value={qty} onChange={e=>setQty(e.target.value)} type="number" placeholder="150" style={IS}/></div>
                <div style={{flex:1}}><Lbl>Unit</Lbl><select value={unit} onChange={e=>setUnit(e.target.value)} style={IS}>{["g","ml","oz","cup","tbsp","tsp","piece","serving"].map(u=><option key={u}>{u}</option>)}</select></div>
              </div>
              <Btn onClick={()=>{setLoading(true);aiLookup(foodName,qty,unit,n=>{setNut(n);},s=>{setAiMsg(s);setLoading(false);});}} disabled={loading||!foodName.trim()||!qty} color={`linear-gradient(135deg,${C.accent},${C.accentDim})`} style={{marginBottom:8}}>{loading?"⏳ Looking up…":"✨ Auto-fill Nutrition with AI"}</Btn>
              {aiMsg&&<div style={{fontSize:12,color:aiMsg.startsWith("✓")?C.green:C.muted,marginBottom:10,textAlign:"center"}}>{aiMsg}</div>}
              <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:14,marginBottom:14}}>
                <div style={{fontSize:11,color:C.muted,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:10}}>Macronutrients</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
                  {MACRO_FIELDS.map(({key,label,unit:u})=>(<div key={key}><div style={{fontSize:9,color:C.muted,marginBottom:3}}>{label} ({u})</div><input value={nut[key]} onChange={e=>setNut(p=>({...p,[key]:e.target.value}))} type="number" placeholder="0" style={{...IS,fontFamily:"monospace",padding:"8px 10px",fontSize:13}}/></div>))}
                </div>
                <div style={{fontSize:11,color:C.muted,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:10}}>Micronutrients</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  {MICRO_FIELDS.map(({key,label,unit:u})=>(<div key={key}><div style={{fontSize:9,color:C.muted,marginBottom:3}}>{label} ({u})</div><input value={nut[key]} onChange={e=>setNut(p=>({...p,[key]:e.target.value}))} type="number" placeholder="0" style={{...IS,fontFamily:"monospace",padding:"8px 10px",fontSize:13}}/></div>))}
                </div>
              </div>
              <Btn onClick={addEntry} disabled={!foodName.trim()||!nut.calories}>Add to {addMeal}</Btn>
            </div>
          )}
          {importMode&&(
            <div>
              <div style={{marginBottom:10}}><Lbl>Recipe / Meal Name</Lbl><input value={impName} onChange={e=>setImpName(e.target.value)} placeholder="e.g. Lunch Bowl…" style={IS}/></div>
              <div style={{marginBottom:12}}>
                <Lbl>Paste Claude's Nutrition Text</Lbl>
                <div style={{fontSize:11,color:C.muted,background:C.bg,border:`1px solid ${C.border}`,borderRadius:7,padding:"8px 12px",marginBottom:8,lineHeight:1.6}}>💡 In Claude chat → ask for nutrition → copy the reply → paste below</div>
                <textarea value={importTxt} onChange={e=>{setImportTxt(e.target.value);setImpStatus("");setParsed([]);}} placeholder={"Paste Claude's response here…\n\n150g chicken: 248 kcal, 46g protein…"} rows={6} style={{...IS,resize:"vertical",lineHeight:1.7}}/>
              </div>
              <Btn onClick={doParse} disabled={impLoading||!importTxt.trim()} color={`linear-gradient(135deg,${C.accent},${C.accentDim})`} style={{marginBottom:8}}>{impLoading?"⏳ Parsing…":"🔍 Parse Nutrition Data"}</Btn>
              {impStatus&&<div style={{fontSize:12,marginBottom:10,textAlign:"center",color:impStatus.startsWith("✓")?C.green:impStatus.startsWith("⚠")?C.red:C.muted}}>{impStatus}</div>}
              {parsed.length>0&&(
                <div>
                  <Lbl>Select items to add</Lbl>
                  {parsed.map((item,idx)=>(
                    <div key={item._id} onClick={()=>setParsed(p=>p.map((x,i)=>i===idx?{...x,selected:!x.selected}:x))} style={{background:item.selected?C.card:C.bg,border:`1px solid ${item.selected?C.accent:C.border}`,borderRadius:10,padding:"10px 13px",marginBottom:8,cursor:"pointer",display:"flex",alignItems:"center",gap:12}}>
                      <div style={{width:18,height:18,borderRadius:5,flexShrink:0,border:`2px solid ${item.selected?C.accent:C.border}`,background:item.selected?C.accent:"none",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:C.bg,fontWeight:700}}>{item.selected?"✓":""}</div>
                      <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{item.food}</div><div style={{fontSize:11,color:C.muted,marginTop:2}}>{item.quantity}{item.unit||"g"} · {item.calories} kcal · P:{item.protein}g C:{item.carbs}g F:{item.fat}g</div></div>
                    </div>
                  ))}
                  <Btn onClick={addParsed} disabled={!parsed.some(i=>i.selected)} style={{marginTop:4}}>Add {parsed.filter(i=>i.selected).length} Items to {addMeal}</Btn>
                </div>
              )}
            </div>
          )}
        </div>
      )}

      {/* ── HISTORY ── */}
      {tab==="diary"&&view==="history"&&(
        <div style={{padding:"14px 18px"}}>
          {histDates.length===0?<div style={{textAlign:"center",padding:"40px",color:C.muted}}>No history yet.</div>
          :histDates.map(date=>{
            const dd=entries[date]||[],cal=dd.reduce((s,e)=>s+e.calories,0),prot=dd.reduce((s,e)=>s+e.protein,0);
            return(
              <button key={date} onClick={()=>{setSelDate(date);setView("main");}} style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:13,padding:"14px 16px",marginBottom:8,cursor:"pointer",textAlign:"left",color:C.text,fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div><div style={{fontSize:14,fontWeight:600}}>{fmtDate(date)}</div><div style={{fontSize:11,color:C.muted,marginTop:3}}>{dd.length} items · {Math.round(prot)}g protein</div></div>
                <div style={{textAlign:"right"}}><div style={{fontSize:16,fontWeight:700,fontFamily:"monospace",color:cal>goals.calories?C.red:C.accent}}>{Math.round(cal)}</div><div style={{fontSize:10,color:C.muted}}>kcal</div></div>
              </button>
            );
          })}
        </div>
      )}

      {/* ── PROFILE ── */}
      {tab==="profile"&&view==="main"&&(
        <div style={{padding:"16px 18px"}}>
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:18,marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
              <div><div style={{fontSize:10,color:C.muted,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:2}}>Current Weight</div><div style={{fontSize:30,fontWeight:700,fontFamily:"monospace"}}>{profile.currentWeight||"—"}<span style={{fontSize:14,color:C.muted}}> kg</span></div></div>
              <div style={{textAlign:"right"}}><div style={{fontSize:10,color:C.muted,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:2}}>Target</div><div style={{fontSize:24,fontWeight:700,fontFamily:"monospace",color:C.green}}>{profile.targetWeight||"—"}<span style={{fontSize:12,color:C.muted}}> kg</span></div></div>
            </div>
            {profile.currentWeight&&profile.targetWeight&&(
              <div style={{fontSize:12,marginBottom:12}}>
                {parseFloat(profile.currentWeight)>parseFloat(profile.targetWeight)?<span style={{color:C.orange}}>📉 {(parseFloat(profile.currentWeight)-parseFloat(profile.targetWeight)).toFixed(1)} kg to goal</span>:<span style={{color:C.green}}>🎉 Target reached!</span>}
              </div>
            )}
            <WeightChart weights={weights} target={parseFloat(profile.targetWeight)||null}/>
            <div style={{display:"flex",gap:8,marginTop:14}}>
              <input value={newWt} onChange={e=>setNewWt(e.target.value)} type="number" placeholder="Log today's weight (kg)" style={{...IS,flex:1}}/>
              <button onClick={logWeight} disabled={!newWt} style={{padding:"11px 16px",background:newWt?C.accent:C.border,border:"none",borderRadius:9,color:C.bg,fontWeight:700,fontSize:13,cursor:newWt?"pointer":"not-allowed",fontFamily:"inherit",flexShrink:0}}>Log</button>
            </div>
          </div>
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:18,marginBottom:14}}>
            <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>Personal Info</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              {[{label:"Name",key:"name",type:"text",ph:"Your name"},{label:"Height (cm)",key:"height",type:"number",ph:"175"},{label:"Current Weight (kg)",key:"currentWeight",type:"number",ph:"81"},{label:"Target Weight (kg)",key:"targetWeight",type:"number",ph:"70"}].map(({label,key,type,ph})=>(
                <div key={key}><Lbl>{label}</Lbl><input value={profEdit[key]||""} onChange={e=>setProfEdit(p=>({...p,[key]:e.target.value}))} type={type} placeholder={ph} style={IS}/></div>
              ))}
            </div>
          </div>
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:18,marginBottom:14}}>
            <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>Daily Nutrition Goals</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              {[{label:"Calories (kcal)",key:"calorieGoal",ph:"1800"},{label:"Protein (g)",key:"protein",ph:"130"},{label:"Carbs (g)",key:"carbs",ph:"180"},{label:"Fat (g)",key:"fat",ph:"55"},{label:"Fiber (g)",key:"fiber",ph:"25"}].map(({label,key,ph})=>(
                <div key={key}><Lbl>{label}</Lbl><input value={profEdit[key]||""} onChange={e=>setProfEdit(p=>({...p,[key]:e.target.value}))} type="number" placeholder={ph} style={IS}/></div>
              ))}
            </div>
          </div>
          <Btn onClick={saveProfile} color={C.green}>Save Profile &amp; Goals</Btn>
        </div>
      )}

      {/* ── RECIPES LIST ── */}
      {tab==="recipes"&&view==="main"&&(
        <div style={{padding:"16px 18px"}}>
          <button onClick={()=>{setEditRec(null);setRecName("");setRecItems([]);setRecAiMsg("");setView("recipe-edit");}} style={{width:"100%",padding:"13px",background:`linear-gradient(135deg,${C.accent},${C.accentDim})`,border:"none",borderRadius:10,color:C.bg,fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"inherit",marginBottom:16}}>+ New Recipe</button>
          {recipeBook.length===0?(
            <div style={{textAlign:"center",padding:"40px",color:C.muted,lineHeight:1.8,fontSize:15}}><div style={{fontSize:40,marginBottom:12}}>📚</div>No saved recipes.<br/>Create one above.</div>
          ):recipeBook.map(rec=>{
            const rt=sumE(rec.items);
            return(
              <div key={rec.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"15px 16px",marginBottom:10}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                  <div style={{fontSize:15,fontWeight:700}}>{rec.name}</div>
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={()=>startEdit(rec)} style={{background:"none",border:`1px solid ${C.border}`,color:C.muted,borderRadius:7,padding:"5px 12px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>Edit</button>
                    <button onClick={()=>pRB(recipeBook.filter(r=>r.id!==rec.id))} style={{background:"none",border:"none",color:C.border,cursor:"pointer",fontSize:18,padding:4,lineHeight:1}}>✕</button>
                  </div>
                </div>
                <div style={{fontSize:11,color:C.muted,marginBottom:8}}>{rec.items.length} ingredients</div>
                <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
                  <span style={{fontSize:13,color:C.accent,fontFamily:"monospace",fontWeight:700}}>{Math.round(rt.calories)} kcal</span>
                  <span style={{fontSize:11,color:C.muted}}>P:{Math.round(rt.protein)}g</span>
                  <span style={{fontSize:11,color:C.muted}}>C:{Math.round(rt.carbs)}g</span>
                  <span style={{fontSize:11,color:C.muted}}>F:{Math.round(rt.fat)}g</span>
                </div>
                <button onClick={()=>startUse(rec)} style={{width:"100%",padding:"11px",background:C.green,border:"none",borderRadius:9,color:C.bg,fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>🍳 Use This Recipe</button>
              </div>
            );
          })}
        </div>
      )}

      {/* ── RECIPE EDIT ── */}
      {view==="recipe-edit"&&(
        <div style={{padding:"16px 18px"}}>
          <div style={{marginBottom:12}}><Lbl>Recipe Name</Lbl><input value={recName} onChange={e=>setRecName(e.target.value)} placeholder="e.g. Fish & Veggie Bowl" style={IS}/></div>
          <Lbl>Ingredients</Lbl>
          {recItems.map((item,idx)=>(
            <div key={item._id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:13,marginBottom:10}}>
              <div style={{display:"flex",gap:6,marginBottom:8}}>
                <input value={item.food} onChange={e=>updRI(idx,"food",e.target.value)} placeholder="Food name" style={{...IS,flex:3}}/>
                <input value={item.quantity} onChange={e=>updRI(idx,"quantity",e.target.value)} type="number" placeholder="Qty" style={{...IS,flex:1}}/>
                <select value={item.unit} onChange={e=>updRI(idx,"unit",e.target.value)} style={{...IS,flex:1}}>{["g","ml","oz","cup","tbsp","tsp","piece","serving"].map(u=><option key={u}>{u}</option>)}</select>
              </div>
              <div style={{display:"flex",gap:6,marginBottom:8}}>
                <button onClick={()=>aiRI(idx)} disabled={recLoad||!item.food.trim()||!item.quantity} style={{flex:2,padding:"8px",background:`linear-gradient(135deg,${C.accent},${C.accentDim})`,border:"none",borderRadius:7,color:C.bg,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit",opacity:(!item.food.trim()||!item.quantity)?0.5:1}}>✨ AI Fill</button>
                <button onClick={()=>setRecItems(p=>p.filter((_,i)=>i!==idx))} style={{flex:1,padding:"8px",background:"none",border:`1px solid ${C.border}`,borderRadius:7,color:C.muted,fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>Remove</button>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:6}}>
                {MACRO_FIELDS.map(({key,label,unit:u})=>(<div key={key}><div style={{fontSize:8,color:C.muted,marginBottom:2}}>{label}({u})</div><input value={item[key]||""} onChange={e=>updRI(idx,key,e.target.value)} type="number" placeholder="0" style={{...IS,padding:"6px 8px",fontSize:12,fontFamily:"monospace"}}/></div>))}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6}}>
                {MICRO_FIELDS.map(({key,label,unit:u})=>(<div key={key}><div style={{fontSize:8,color:C.muted,marginBottom:2}}>{label}({u})</div><input value={item[key]||""} onChange={e=>updRI(idx,key,e.target.value)} type="number" placeholder="0" style={{...IS,padding:"6px 8px",fontSize:12,fontFamily:"monospace"}}/></div>))}
              </div>
            </div>
          ))}
          {recAiMsg&&<div style={{fontSize:12,color:recAiMsg.startsWith("✓")?C.green:C.muted,marginBottom:8,textAlign:"center"}}>{recAiMsg}</div>}
          <button onClick={addRI} style={{width:"100%",padding:"12px",background:"none",border:`1px dashed ${C.accent}`,borderRadius:10,color:C.accent,fontSize:13,cursor:"pointer",fontFamily:"inherit",marginBottom:12}}>+ Add Ingredient</button>
          <Btn onClick={saveRecipe} disabled={!recName.trim()||!recItems.length} color={C.green}>{editRec?"Update Recipe":"Save Recipe"}</Btn>
        </div>
      )}

      {/* ── RECIPE USE ── */}
      {view==="recipe-use"&&useRec&&(
        <div style={{padding:"16px 18px"}}>
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:16,marginBottom:14}}>
            <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>{useRec.name}</div>
            <div style={{fontSize:11,color:C.muted,marginBottom:14}}>Adjust quantities — nutrition scales automatically.</div>
            {useRec.items.map(item=>{
              const k=item._id??item.food,oQ=parseFloat(item.quantity)||1,nQ=parseFloat(useQtys[k])||oQ,ratio=nQ/oQ;
              return(
                <div key={k} style={{borderBottom:`1px solid ${C.border}`,paddingBottom:12,marginBottom:12}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
                    <div style={{flex:1,fontSize:14,fontWeight:500}}>{item.food}</div>
                    <input value={useQtys[k]||""} onChange={e=>setUseQtys(p=>({...p,[k]:e.target.value}))} type="number" style={{...IS,width:72,flex:"none",fontFamily:"monospace",padding:"7px 9px"}}/>
                    <span style={{fontSize:12,color:C.muted}}>{item.unit||"g"}</span>
                  </div>
                  <div style={{fontSize:11,color:C.muted}}><span style={{fontFamily:"monospace",color:C.accent}}>{Math.round((item.calories||0)*ratio)}</span> kcal · P:{Math.round((item.protein||0)*ratio)}g · C:{Math.round((item.carbs||0)*ratio)}g · F:{Math.round((item.fat||0)*ratio)}g</div>
                </div>
              );
            })}
          </div>
          <div style={{marginBottom:14}}>
            <Lbl>Log to Meal</Lbl>
            <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
              {MEAL_TYPES.map(m=><button key={m} onClick={()=>setUseMeal(m)} style={{padding:"7px 13px",borderRadius:20,fontSize:12,cursor:"pointer",fontFamily:"inherit",border:`1px solid ${useMeal===m?C.accent:C.border}`,background:useMeal===m?C.accent:"none",color:useMeal===m?C.bg:C.muted,fontWeight:useMeal===m?700:400}}>{MEAL_ICONS[m]} {m}</button>)}
            </div>
          </div>
          <Btn onClick={logRecipe} color={C.green}>Log Recipe to {useMeal}</Btn>
        </div>
      )}

      {/* ── REPORTS ── */}
      {tab==="reports"&&view==="main"&&(
        <div style={{padding:"16px 18px"}}>
          <div style={{display:"flex",background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:3,marginBottom:14,gap:3}}>
            {[{label:"Daily",val:"daily"},{label:"Weekly",val:"weekly"},{label:"Monthly",val:"monthly"}].map(({label,val})=>(
              <button key={val} onClick={()=>setRepPeriod(val)} style={{flex:1,padding:"9px",borderRadius:7,border:"none",cursor:"pointer",background:repPeriod===val?C.accent:"none",color:repPeriod===val?C.bg:C.muted,fontSize:13,fontFamily:"inherit",fontWeight:repPeriod===val?700:400}}>{label}</button>
            ))}
          </div>
          {repData.length===0?(
            <div style={{textAlign:"center",padding:"40px",color:C.muted,fontSize:14}}>No data yet for this period.</div>
          ):(
            <>
              {(()=>{
                const avg=Object.fromEntries(ALL_FIELDS.map(f=>[f.key,repData.reduce((s,d)=>s+(d.totals[f.key]||0),0)/repData.length]));
                return(
                  <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:16,marginBottom:14}}>
                    <div style={{fontSize:11,color:C.muted,letterSpacing:"0.07em",textTransform:"uppercase",marginBottom:10}}>{repPeriod==="daily"?"Last 14 Days Avg":repPeriod==="weekly"?"Weekly Avg (per day)":"Monthly Avg (per day)"}</div>
                    <div style={{display:"flex",gap:5,marginBottom:8}}>
                      {[{label:"Calories",value:avg.calories,unit:"kcal",color:C.accent},{label:"Protein",value:avg.protein,unit:"g",color:C.blue},{label:"Carbs",value:avg.carbs,unit:"g",color:C.orange},{label:"Fat",value:avg.fat,unit:"g",color:C.accentDim}].map(b=><Badge key={b.label} {...b}/>)}
                    </div>
                    <div style={{display:"flex",gap:5}}>
                      {[{label:"Fiber",value:avg.fiber,unit:"g",color:C.green},{label:"Sodium",value:avg.sodium,unit:"mg",color:C.purple},{label:"Calcium",value:avg.calcium,unit:"mg",color:C.purple},{label:"Iron",value:avg.iron,unit:"mg",color:C.purple}].map(b=><Badge key={b.label} {...b}/>)}
                    </div>
                  </div>
                );
              })()}
              <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:16,marginBottom:10}}>
                <div style={{fontSize:13,fontWeight:600,marginBottom:10}}>Calories{repPeriod!=="daily"?" (avg/day)":""}</div>
                <BarChart data={repData.map(d=>({label:d.label,value:d.totals.calories}))} goal={goals.calories} color={C.accent}/>
              </div>
              {[{key:"protein",label:"Protein (g)",color:C.blue,goal:goals.protein},{key:"carbs",label:"Carbs (g)",color:C.orange,goal:goals.carbs},{key:"fat",label:"Fat (g)",color:C.accentDim,goal:goals.fat},{key:"fiber",label:"Fiber (g)",color:C.green,goal:goals.fiber}].map(({key,label,color,goal})=>(
                <div key={key} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:16,marginBottom:10}}>
                  <div style={{fontSize:13,fontWeight:600,marginBottom:8}}>{label}</div>
                  <BarChart data={repData.map(d=>({label:d.label,value:d.totals[key]}))} goal={goal} color={color}/>
                </div>
              ))}
              <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:16,marginBottom:10}}>
                <div style={{fontSize:13,fontWeight:600,marginBottom:12}}>Micronutrients (avg)</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  {MICRO_FIELDS.map(({key,label,unit:u})=>{
                    const avg=repData.reduce((s,d)=>s+(d.totals[key]||0),0)/repData.length;
                    return(<div key={key} style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:9,padding:"11px 12px"}}><div style={{fontSize:11,color:C.muted,marginBottom:3}}>{label}</div><div style={{fontSize:16,fontWeight:700,fontFamily:"monospace",color:C.purple}}>{avg<1?avg.toFixed(1):Math.round(avg)}<span style={{fontSize:10,color:C.muted}}>{u}</span></div></div>);
                  })}
                </div>
              </div>
              <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:16}}>
                <div style={{fontSize:13,fontWeight:600,marginBottom:12}}>Detailed Breakdown</div>
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                    <thead><tr>{["Period","Kcal","Prot","Carb","Fat","Fib","Na","K","Ca"].map(h=><th key={h} style={{textAlign:"left",padding:"5px 6px",color:C.muted,fontWeight:600,borderBottom:`1px solid ${C.border}`,whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
                    <tbody>
                      {repData.map((d,i)=>(
                        <tr key={i} style={{borderBottom:`1px solid ${C.border}`}}>
                          <td style={{padding:"6px",color:C.muted,whiteSpace:"nowrap"}}>{d.label}</td>
                          <td style={{padding:"6px",fontFamily:"monospace",color:C.accent}}>{Math.round(d.totals.calories)}</td>
                          <td style={{padding:"6px",fontFamily:"monospace"}}>{Math.round(d.totals.protein)}</td>
                          <td style={{padding:"6px",fontFamily:"monospace"}}>{Math.round(d.totals.carbs)}</td>
                          <td style={{padding:"6px",fontFamily:"monospace"}}>{Math.round(d.totals.fat)}</td>
                          <td style={{padding:"6px",fontFamily:"monospace"}}>{Math.round(d.totals.fiber)}</td>
                          <td style={{padding:"6px",fontFamily:"monospace",color:C.muted}}>{Math.round(d.totals.sodium)}</td>
                          <td style={{padding:"6px",fontFamily:"monospace",color:C.muted}}>{Math.round(d.totals.potassium)}</td>
                          <td style={{padding:"6px",fontFamily:"monospace",color:C.muted}}>{Math.round(d.totals.calcium)}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </>
          )}
        </div>
      )}

      {/* BOTTOM NAV */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:C.bg,borderTop:`1px solid ${C.border}`,display:"flex",zIndex:20,paddingBottom:"env(safe-area-inset-bottom,0)"}}>
        {TABS.map(({id,icon,label})=>(
          <button key={id} onClick={()=>{setTab(id);setView("main");}} style={{flex:1,padding:"11px 0 13px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            <span style={{fontSize:20}}>{icon}</span>
            <span style={{fontSize:10,letterSpacing:"0.06em",textTransform:"uppercase",color:tab===id?C.accent:C.muted,fontWeight:tab===id?700:400,fontFamily:"inherit"}}>{label}</span>
          </button>
        ))}
      </div>

      {/* FAB */}
      {tab==="diary"&&view==="main"&&(
        <button onClick={()=>setView("add")} style={{position:"fixed",bottom:80,right:18,width:56,height:56,borderRadius:"50%",background:`linear-gradient(135deg,${C.accent},${C.accentDim})`,border:"none",color:C.bg,fontSize:26,cursor:"pointer",boxShadow:`0 4px 20px rgba(232,197,71,0.4)`,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>+</button>
      )}
    </div>
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>

<button id="install-banner" style="display:none">
  <img src="/icon-192.png" alt="Food Journal icon"/>
  <div class="txt">
    <strong>Install Food Journal</strong>
    <span>Add to home screen for app experience</span>
  </div>
  <span class="arrow">📲</span>
  <button id="install-dismiss">✕</button>
</button>

<script>
let deferredPrompt = null;
const banner = document.getElementById('install-banner');
const dismiss = document.getElementById('install-dismiss');

// Capture the install prompt
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  // Show our custom banner after 2 seconds
  setTimeout(() => banner.classList.add('show'), 2000);
});

// Tapping the banner triggers install
banner.addEventListener('click', async (e) => {
  if (e.target === dismiss || dismiss.contains(e.target)) {
    banner.classList.remove('show');
    return;
  }
  if (!deferredPrompt) return;
  banner.classList.remove('show');
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
});

dismiss.addEventListener('click', (e) => {
  e.stopPropagation();
  banner.classList.remove('show');
});

// Hide banner if already installed
window.addEventListener('appinstalled', () => {
  banner.classList.remove('show');
  deferredPrompt = null;
});

// Register service worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(reg => console.log('SW registered:', reg.scope))
      .catch(err => console.log('SW failed:', err));
  });
}
</script>
</body>
</html>
