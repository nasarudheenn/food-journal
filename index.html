<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#0f0e0c"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Food Journal"/>
<title>Food Journal</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#0f0e0c;color:#f0ece0;font-family:Georgia,'Times New Roman',serif;overscroll-behavior:none;}
#app{height:100%;}
input,select,textarea,button{font-family:Georgia,'Times New Roman',serif;}
::-webkit-scrollbar{display:none;}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
.mov{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
.mbx{background:#1a1917;border-radius:20px 20px 0 0;padding:20px 18px 32px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;}
#install-banner{display:none;position:fixed;bottom:90px;left:50%;transform:translateX(-50%);width:calc(100% - 36px);max-width:444px;background:linear-gradient(135deg,#e8c547,#b89c2f);color:#0f0e0c;border-radius:14px;padding:14px 18px;z-index:999;box-shadow:0 4px 24px rgba(232,197,71,0.5);align-items:center;gap:14px;cursor:pointer;border:none;font-family:Georgia,serif;}
#install-banner.show{display:flex!important;}
#install-banner img{width:44px;height:44px;border-radius:10px;flex-shrink:0;}
#install-banner .txt{flex:1;text-align:left;}
#install-banner .txt strong{display:block;font-size:14px;font-weight:700;margin-bottom:2px;}
#install-banner .txt span{font-size:11px;opacity:0.75;}
#install-dismiss{position:absolute;top:8px;right:10px;background:none;border:none;color:#0f0e0c;font-size:16px;cursor:pointer;opacity:0.6;padding:2px 6px;}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdn.jsdelivr.net/npm/preact@10/dist/preact.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/preact@10/hooks/dist/hooks.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/htm@3/dist/htm.umd.js"></script>
<script>
// --- AUTO-UPDATE v30 ---
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then(reg => {
      reg.update();
      reg.onupdatefound = () => {
        const installingWorker = reg.installing;
        installingWorker.onstatechange = () => {
          if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
            window.location.reload();
          }
        };
      };
    });
  });
}

const {h, render} = preact;
const {useState, useEffect, useRef, useCallback} = preactHooks;
const html = htm.bind(h);

const SK={entries:"fd-entries-v2",profile:"fd-profile-v2",apiKey:"fd-apikey-v1"};
const store={
  get:k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
};

const C={bg:"#0f0e0c",card:"#1a1917",border:"#3a3835",accent:"#e8c547",text:"#f0ece0",muted:"#7a7060",blue:"#5299e0",green:"#52c47a"};
const FIELDS=[{key:"calories",label:"Calories",unit:"kcal"},{key:"protein",label:"Protein",unit:"g"}];

function App() {
  const [view, setView] = useState("diary");
  const [profile] = useState(() => store.get(SK.profile) || {name: "Nasarudheen N"});
  const [entries, setEntries] = useState(() => store.get(SK.entries) || {});
  const today = new Date().toISOString().split('T')[0];

  const currentEntries = entries[today] || [];
  const totals = currentEntries.reduce((acc, curr) => {
    acc.calories += (Number(curr.calories) || 0);
    acc.protein += (Number(curr.protein) || 0);
    return acc;
  }, {calories: 0, protein: 0});

  return html`
    <div style=${{display: 'flex', flexDirection: 'column', height: '100%'}}>
      <header style=${{padding: '20px', borderBottom: `1px solid ${C.border}`, display: 'flex', justifyContent: 'space-between'}}>
        <span style=${{color: C.accent, fontWeight: 'bold'}}>v30</span>
        <span>${profile.name}</span>
      </header>

      <main style=${{flex: 1, padding: '15px', overflowY: 'auto'}}>
        ${view === "diary" ? html`
          <div style=${{background: C.card, padding: '20px', borderRadius: '15px', marginBottom: '20px'}}>
            <div style=${{fontSize: '12px', color: C.muted}}>Today's Progress</div>
            <div style=${{display: 'flex', gap: '20px', marginTop: '10px'}}>
              <div><strong style=${{color: C.accent}}>${totals.calories}</strong> kcal</div>
              <div><strong style=${{color: C.blue}}>${totals.protein}g</strong> Protein</div>
            </div>
          </div>
          
          <h3>Entries</h3>
          ${currentEntries.length === 0 ? html`<p style=${{color: C.muted, marginTop: '10px'}}>No logs today.</p>` : 
            currentEntries.map(e => html`
              <div style=${{padding: '12px', borderBottom: `1px solid ${C.border}`}}>
                <div>${e.name}</div>
                <div style=${{fontSize: '12px', color: C.muted}}>${e.calories} kcal | ${e.protein}g P</div>
              </div>
            `)}
        ` : html`<div style=${{textAlign: 'center', marginTop: '50px', color: C.muted}}>Section coming soon...</div>`}
      </main>

      <nav style=${{height: '70px', background: C.card, display: 'flex', justifyContent: 'space-around', alignItems: 'center', borderTop: `1px solid ${C.border}`}}>
        <div onClick=${() => setView("diary")} style=${{color: view === "diary" ? C.accent : C.muted}}>Diary</div>
        <div onClick=${() => setView("recipes")} style=${{color: view === "recipes" ? C.accent : C.muted}}>Recipes</div>
        <div onClick=${() => setView("reports")} style=${{color: view === "reports" ? C.accent : C.muted}}>Reports</div>
      </nav>
    </div>
  `;
}

render(html`<${App}/>`, document.getElementById('app'));
</script>
</body>
</html>
