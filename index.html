<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#0f0e0c"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Food Journal"/>
<title>Food Journal</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#0f0e0c;color:#f0ece0;font-family:Georgia,'Times New Roman',serif;overscroll-behavior:none;}
#app{height:100%;}
input,select,textarea,button{font-family:Georgia,'Times New Roman',serif;}
::-webkit-scrollbar{display:none;}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
.mov{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
.mbx{background:#1a1917;border-radius:20px 20px 0 0;padding:20px 18px 32px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;}
#install-banner{display:none;position:fixed;bottom:90px;left:50%;transform:translateX(-50%);width:calc(100% - 36px);max-width:444px;background:linear-gradient(135deg,#e8c547,#b89c2f);color:#0f0e0c;border-radius:14px;padding:14px 18px;z-index:999;box-shadow:0 4px 24px rgba(232,197,71,0.5);align-items:center;gap:14px;cursor:pointer;border:none;font-family:Georgia,serif;}
#install-banner.show{display:flex!important;}
#install-banner img{width:44px;height:44px;border-radius:10px;flex-shrink:0;}
#install-banner .txt{flex:1;text-align:left;}
#install-banner .txt strong{display:block;font-size:14px;font-weight:700;margin-bottom:2px;}
#install-banner .txt span{font-size:11px;opacity:0.75;}
#install-dismiss{position:absolute;top:8px;right:10px;background:none;border:none;color:#0f0e0c;font-size:16px;cursor:pointer;opacity:0.6;padding:2px 6px;}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdn.jsdelivr.net/npm/preact@10/dist/preact.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/preact@10/hooks/dist/hooks.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/htm@3/dist/htm.umd.js"></script>
<script>
const {h, render} = preact;
const {useState, useEffect, useRef, useCallback} = preactHooks;
const html = htm.bind(h);

const SK={entries:"fd-entries-v2",profile:"fd-profile-v2",weights:"fd-weights-v2",recipes:"fd-recipebook-v2",apiKey:"fd-apikey-v1",autoBackup:"fd-autobackup-v1",lastBackup:"fd-lastbackup-v1"};
const store={
  get:k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
};

const GIST_URL="https://gist.githubusercontent.com/nasarudheenn/36f66934e828a52c0330cc87af935c28/raw/config.json";
(async()=>{
  try{
    const res=await fetch(GIST_URL+"?t="+Date.now());
    const data=await res.json();
    if(data.apiKey){localStorage.setItem(SK.apiKey,data.apiKey);}
  }catch(e){console.log("Gist fetch failed, using stored key");}
})();

const DEFAULT_PROFILE={name:"Nasarudheen N",currentWeight:"81",targetWeight:"70",height:"175",calorieGoal:1800,protein:130,carbs:180,fat:55,fiber:25,sugar:50,saturatedFat:20,polyFat:10,monoFat:15,cholesterol:300,sodium:2300,potassium:3500,calcium:1000,iron:18,vitC:90,vitD:20,vitB12:2.4,zinc:11};
const C={bg:"#0f0e0c",card:"#1a1917",border:"#3a3835",accent:"#e8c547",accentDim:"#b89c2f",text:"#f0ece0",muted:"#7a7060",red:"#e05252",green:"#52c47a",blue:"#5299e0",orange:"#e08a52",purple:"#a07ee0"};
const MEAL_TYPES=["Breakfast","Mid-Morning","Lunch","Evening","Dinner"];
const MACRO_FIELDS=[
  {key:"calories",label:"Calories",unit:"kcal",color:C.accent},
  {key:"protein",label:"Protein",unit:"g",color:C.blue},
  {key:"carbs",label:"Carbs",unit:"g",color:C.orange},
  {key:"fat",label:"Fat (Total)",unit:"g",color:C.accentDim},
  {key:"saturatedFat",label:"Saturated Fat",unit:"g",color:"#c4704a"},
  {key:"polyFat",label:"Polyunsat. Fat",unit:"g",color:"#7ab0e0"},
  {key:"monoFat",label:"Monounsat. Fat",unit:"g",color:"#a0c07a"},
  {key:"cholesterol",label:"Cholesterol",unit:"mg",color:"#d4a04a"},
  {key:"fiber",label:"Fiber",unit:"g",color:C.green},
  {key:"sugar",label:"Sugar",unit:"g",color:"#e07ab0"},
];
const MICRO_FIELDS=[
  {key:"sodium",label:"Sodium",unit:"mg"},{key:"potassium",label:"Potassium",unit:"mg"},
  {key:"calcium",label:"Calcium",unit:"mg"},{key:"iron",label:"Iron",unit:"mg"},
  {key:"vitC",label:"Vit C",unit:"mg"},{key:"vitD",label:"Vit D",unit:"μg"},
  {key:"vitB12",label:"Vit B12",unit:"μg"},{key:"zinc",label:"Zinc",unit:"mg"},
];
const ALL_FIELDS=[...MACRO_FIELDS,...MICRO_FIELDS];
const TABS=[{id:"diary",icon:"📖",label:"Diary"},{id:"recipes",icon:"📚",label:"Recipes"},{id:"reports",icon:"📊",label:"Reports"},{id:"profile",icon:"👤",label:"Profile"}];
const IS={width:"100%",padding:"10px 12px",background:"#222120",border:"1px solid #4a4845",borderRadius:9,color:"#f0ece0",fontSize:14,fontFamily:"Georgia,serif",outline:"none",boxSizing:"border-box"};

const todayStr=()=>new Date().toISOString().split("T")[0];
const fmtDate=d=>new Date(d+"T00:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
const fmtShort=d=>new Date(d+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"});
const isoWeek=d=>{const dt=new Date(d+"T00:00:00"),j=new Date(dt.getFullYear(),0,1);return Math.ceil(((dt-j)/86400000+j.getDay()+1)/7);};
const isoMonth=d=>d.slice(0,7);
const emptyNut=()=>Object.fromEntries(ALL_FIELDS.map(f=>[f.key,""]));
const sumE=list=>{const o=Object.fromEntries(ALL_FIELDS.map(f=>[f.key,0]));list.forEach(e=>ALL_FIELDS.forEach(f=>{o[f.key]+=(Number(e[f.key])||0);}));return o;};
function getMealByTime(){
  const h=new Date().getHours(),m=new Date().getMinutes(),t=h*60+m;
  if(t<600)return"Breakfast";
  if(t<720)return"Mid-Morning";
  if(t<900)return"Lunch";
  if(t<1020)return"Evening";
  return"Dinner";
}
function getMealByTimeFromTags(tags){
  if(!tags||!tags.length)return getMealByTime();
  const current=getMealByTime();
  return tags.includes(current)?current:tags[0];
}

async function callAI(messages,maxTokens=600){
  const key=localStorage.getItem(SK.apiKey)||"";
  if(!key){throw new Error("No API key");}
  const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key.trim(),"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:maxTokens,messages})});
  const d=await res.json();
  if(d.error)throw new Error(d.error.message);
  return d.content?.map(b=>b.text||"").join("")||"";
}
async function aiNutrition(name,qty,unit){
  const txt=await callAI([{role:"user",content:`Nutrition for ${qty} ${unit} of ${name}. Reply ONLY with this JSON:\n{"calories":0,"protein":0,"carbs":0,"fat":0,"saturatedFat":0,"polyFat":0,"monoFat":0,"cholesterol":0,"fiber":0,"sugar":0,"sodium":0,"potassium":0,"calcium":0,"iron":0,"vitC":0,"vitD":0,"vitB12":0,"zinc":0}\nReplace 0s with correct numeric values.`}]);
  const p=JSON.parse(txt.replace(/```json|```/g,"").trim());
  const r={};ALL_FIELDS.forEach(f=>{const v=Number(p[f.key]);r[f.key]=isNaN(v)?"0":String(Math.round(v*10)/10);});
  return r;
}
async function aiSuggest(q){
  const txt=await callAI([{role:"user",content:`List 8 foods/ingredients where the name or any word in the name starts with "${q}". Reply ONLY with a JSON array of strings, no explanation.`}],150);
  const arr=JSON.parse(txt.replace(/```json|```/g,"").trim());
  if(!Array.isArray(arr))return[];
  return arr.slice(0,5);
}
async function aiParse(text){
  const txt=await callAI([{role:"user",content:`Extract food items from this text. Return ONLY a JSON array. Each item: {food,quantity,unit,calories,protein,carbs,fat,saturatedFat,polyFat,monoFat,cholesterol,fiber,sugar,sodium,potassium,calcium,iron,vitC,vitD,vitB12,zinc} (all numbers).\nText:\n${text}`}],2000);
  const arr=JSON.parse(txt.replace(/```json|```/g,"").trim());
  return Array.isArray(arr)?arr:[];
}

function Lbl({children}){return html`<div style=${{fontSize:10,color:C.muted,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:6}}>${children}</div>`;}
function Btn({onClick,disabled,color,children,style={}}){return html`<button onClick=${onClick} disabled=${disabled} style=${{width:"100%",padding:"13px",borderRadius:10,border:"none",cursor:disabled?"not-allowed":"pointer",background:disabled?C.border:(color||C.green),color:C.bg,fontSize:14,fontWeight:700,fontFamily:"Georgia,serif",opacity:disabled?0.5:1,...style}}>${children}</button>`;}

function MacroBar({label,value,goal,color,showPct}){
  const pct=Math.min((value/goal)*100,100),over=value>goal;
  return html`<div style=${{marginBottom:8}}>
    <div style=${{display:"flex",justifyContent:"space-between",marginBottom:3}}>
      <span style=${{fontSize:11,color:C.muted,letterSpacing:"0.07em",textTransform:"uppercase"}}>${label}</span>
      <span style=${{fontSize:11,color:over?C.red:C.text,fontFamily:"monospace"}}>
        ${Math.round(value)}<span style=${{color:C.muted}}>/${goal}g</span>
      </span>
    </div>
    <div style=${{height:5,background:C.border,borderRadius:3,overflow:"hidden"}}>
      <div style=${{height:"100%",width:`${pct}%`,background:over?C.red:color,borderRadius:3,transition:"width 0.5s ease"}}/>
    </div>
  </div>`;
}

function App(){
  const [entries,setEntries]=useState(()=>store.get(SK.entries)||{});
  const [profile,setProfile]=useState(()=>store.get(SK.profile)||DEFAULT_PROFILE);
  const [recipeBook,setRecipeBook]=useState(()=>store.get(SK.recipes)||[]);
  const [tab,setTab]=useState("diary");
  const [view,setView]=useState("main");
  const [selDate,setSelDate]=useState(todayStr());
  
  // Exit Confirmation State
  const [showExitConfirm, setShowExitConfirm] = useState(false);

  // Add food states
  const [foodName,setFoodName]=useState("");
  const [qty,setQty]=useState("");
  const [unit,setUnit]=useState("g");
  const [nut,setNut]=useState(emptyNut());
  const [recName,setRecName]=useState("");
  const [recItems,setRecItems]=useState([]);

  // Swipe Gesture Implementation
  useEffect(() => {
    let touchStartX = 0;
    const handleTouchStart = (e) => { touchStartX = e.touches[0].clientX; };
    const handleTouchEnd = (e) => {
      const touchEndX = e.changedTouches[0].clientX;
      const dx = touchEndX - touchStartX;
      // Trigger if swipe from left edge (>70px displacement)
      if (touchStartX < 30 && dx > 70) handleBack();
    };
    window.addEventListener('touchstart', handleTouchStart);
    window.addEventListener('touchend', handleTouchEnd);
    return () => {
      window.removeEventListener('touchstart', handleTouchStart);
      window.removeEventListener('touchend', handleTouchEnd);
    };
  }, [view, tab, recItems, foodName]);

  // Handle Back / Exit Logic
  const handleBack = () => {
    const hasUnsavedFood = view === "add" && (foodName || nut.calories > 0);
    const hasUnsavedRecipe = view === "recipe-new" && (recName || recItems.length > 0);
    
    if (hasUnsavedFood || hasUnsavedRecipe) {
      setShowExitConfirm(true);
    } else if (view !== "main") {
      setView("main");
    } else if (tab !== "diary") {
      setTab("diary");
    }
  };

  const pE=d=>{setEntries(d);store.set(SK.entries,d);};
  const goals=profile;
  const dayEs=entries[selDate]||[];
  const dayT=sumE(dayEs);

  return html`
    <div style=${{height:"100%",display:"flex",flexDirection:"column",background:C.bg,color:C.text,position:"relative",overflow:"hidden"}}>
      
      <div style=${{padding:"60px 20px 15px",display:"flex",alignItems:"center",gap:15,borderBottom:`1px solid ${C.border}`,background:C.bg}}>
        ${view !== "main" && html`<button onClick=${handleBack} style=${{background:"none",border:"none",color:C.accent,fontSize:24,cursor:"pointer"}}>←</button>`}
        <h1 style=${{fontSize:24,fontWeight:800}}>${view === "main" ? "Journal" : "Log Food"}</h1>
      </div>

      <div style=${{flex:1,overflowY:"auto",padding:20}}>
        ${view === "main" && html`
          <div style=${{background:C.card,borderRadius:16,padding:20,marginBottom:20,border:`1px solid ${C.border}`}}>
            <${Lbl}>Daily Progress<//>
            <${MacroBar} label="Calories" value=${dayT.calories} goal=${goals.calorieGoal} color=${C.accent}/>
            <${MacroBar} label="Protein" value=${dayT.protein} goal=${goals.protein} color=${C.blue}/>
          </div>
          ${dayEs.length === 0 ? html`<div style=${{textAlign:"center",color:C.muted,marginTop:40}}>No entries for today.</div>` : 
            dayEs.map(e => html`<div style=${{padding:"12px 0",borderBottom:`1px solid ${C.border}`}}><strong>${e.food}</strong> - ${e.quantity}</div>`)}
        `}

        ${view === "add" && html`
          <${Lbl}>Food Name<//>
          <input value=${foodName} onInput=${e=>setFoodName(e.target.value)} style=${IS} placeholder="What did you eat?"/>
          <div style=${{marginTop:20}}>
            <${Btn} onClick=${()=>setView("main")} color=${C.green}>Save Entry<//>
          </div>
        `}
      </div>

      ${showExitConfirm && html`
        <div className="mov" onClick=${() => setShowExitConfirm(false)}>
          <div className="mbx" onClick=${e => e.stopPropagation()} style=${{borderRadius: 20}}>
            <div style=${{fontSize: 36, textAlign: "center", marginBottom: 12}}>🚪</div>
            <div style=${{fontSize: 15, fontWeight: 700, textAlign: "center", marginBottom: 8}}>Discard Changes?</div>
            <div style=${{fontSize: 13, color: C.muted, textAlign: "center", marginBottom: 20}}>You have unsaved changes. Are you sure you want to exit?</div>
            <div style=${{display: "flex", gap: 10}}>
              <button onClick=${() => setShowExitConfirm(false)} style=${{flex: 1, padding: "12px", background: "none", border: `1px solid ${C.border}`, borderRadius: 10, color: C.muted, fontWeight: 700}}>Stay</button>
              <button onClick=${() => { setShowExitConfirm(false); setView("main"); setFoodName(""); setRecItems([]); }} style=${{flex: 1, padding: "12px", background: C.red, border: "none", borderRadius: 10, color: "#fff", fontWeight: 700}}>Discard</button>
            </div>
          </div>
        </div>
      `}

      ${view === "main" && html`
        <div style=${{display:"flex",borderTop:`1px solid ${C.border}`,background:C.card,paddingBottom:"env(safe-area-inset-bottom)"}}>
          ${TABS.map(t => html`
            <div onClick=${()=>setTab(t.id)} style=${{flex:1,padding:"12px 0",textAlign:"center",cursor:"pointer",color:tab===t.id?C.accent:C.muted}}>
              <div style=${{fontSize:20}}>${t.icon}</div>
              <div style=${{fontSize:10,marginTop:4}}>${t.label}</div>
            </div>
          `)}
        </div>
        <button onClick=${()=>setView("add")} style=${{position:"fixed",bottom:80,right:18,width:56,height:56,borderRadius:"50%",background:C.accent,border:"none",fontSize:26,fontWeight:700,color:C.bg}}>+</button>
      `}
    </div>
  `;
}

render(html`<${App}/>`, document.getElementById('app'));
</script>
</body>
</html>
