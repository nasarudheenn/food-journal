// ── Constants ─────────────────────────────────────────────────────────────────
const DEFAULT_PROFILE={name:"Nasarudheen N",currentWeight:"81",targetWeight:"70",height:"175",calorieGoal:1800,protein:130,carbs:180,fat:55,fiber:25,sugar:50,saturatedFat:20,polyFat:10,monoFat:15,cholesterol:300,sodium:2300,potassium:3500,calcium:1000,iron:18,vitC:90,vitD:20,vitB12:2.4,zinc:11};
const C={bg:"#0f0e0c",card:"#A9A9A9",border:"#3a3835",accent:"#e8c547",accentDim:"#b89c2f",text:"#f0ece0",muted:"#7a7060",red:"#e05252",green:"#52c47a",blue:"#5299e0",orange:"#e08a52",purple:"#a07ee0"};
const MEAL_TYPES=["Breakfast","Mid-Morning","Lunch","Evening","Dinner"];

  {key:"cholesterol",label:"Cholesterol",unit:"mg",color:"#d4a04a"},

const MICRO_FIELDS=[

  {key:"calcium",label:"Calcium",unit:"mg"},{key:"iron",label:"Iron",unit:"mg"},

];
const ALL_FIELDS=[...MACRO_FIELDS,...MICRO_FIELDS];
const TABS=[{id:"diary",icon:"📖",label:"Diary"},{id:"recipes",icon:"📚",label:"Recipes"},{id:"reports",icon:"📊",label:"Reports"},{id:"profile",icon:"👤",label:"Profile"}];

// ── Helpers ───────────────────────────────────────────────────────────────────
const todayStr=()=>new Date().toISOString().split("T")[0];
const fmtDate=d=>new Date(d+"T00:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
const fmtShort=d=>new Date(d+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"});
const isoWeek=d=>{const dt=new Date(d+"T00:00:00"),j=new Date(dt.getFullYear(),0,1);return Math.ceil(((dt-j)/86400000+j.getDay()+1)/7);};
const isoMonth=d=>d.slice(0,7);
const emptyNut=()=>Object.fromEntries(ALL_FIELDS.map(f=>[f.key,""]));
const sumE=list=>{const o=Object.fromEntries(ALL_FIELDS.map(f=>[f.key,0]));list.forEach(e=>ALL_FIELDS.forEach(f=>{o[f.key]+=(Number(e[f.key])||0);}));return o;};
const n2s=v=>v===undefined||v===null||v===""?"0":String(Math.round(Number(v)*10)/10);
function getMealByTime(){
  const h=new Date().getHours(),m=new Date().getMinutes(),t=h*60+m;
  if(t<660)return"Breakfast";       // before 11:00
  if(t<720)return"Mid-Morning";     // 11:00-11:59
  if(t<900)return"Lunch";           // 12:00-14:59
  if(t<1020)return"Evening";        // 15:00-16:59
  return"Dinner";                    // 17:00+
}
function getMealByTimeFromTags(tags){
  if(!tags||!tags.length)return getMealByTime();
  const current=getMealByTime();
  return tags.includes(current)?current:tags[0];
}

// ── AI helpers ────────────────────────────────────────────────────────────────
async function callAI(messages,maxTokens=600){
  const key=localStorage.getItem(SK.apiKey)||"";
  if(!key){throw new Error("No API key");}
  const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key.trim(),"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:maxTokens,messages})});
  const d=await res.json();
  if(d.error)throw new Error(d.error.message);
  return d.content?.map(b=>b.text||"").join("")||"";
}
async function aiNutrition(name,qty,unit){
  const txt=await callAI([{role:"user",content:`Nutrition for ${qty} ${unit} of ${name}. Reply ONLY with this JSON:\n{"calories":0,"protein":0,"carbs":0,"fat":0,"saturatedFat":0,"polyFat":0,"monoFat":0,"cholesterol":0,"fiber":0,"sugar":0,"sodium":0,"potassium":0,"calcium":0,"iron":0,"vitC":0,"vitD":0,"vitB12":0,"zinc":0}\nReplace 0s with correct numeric values.`}]);
  const p=JSON.parse(txt.replace(/```json|```/g,"").trim());
  const r={};ALL_FIELDS.forEach(f=>{const v=Number(p[f.key]);r[f.key]=isNaN(v)?"0":String(Math.round(v*10)/10);});
  return r;
}
async function aiSuggest(q){
  const txt=await callAI([{role:"user",content:`List 8 foods/ingredients where the name or any word in the name starts with "${q}". Reply ONLY with a JSON array of strings, no explanation.`}],150);
  const arr=JSON.parse(txt.replace(/```json|```/g,"").trim());
  if(!Array.isArray(arr))return[];
  const ql=q.toLowerCase();
  const withPriority=[];
  arr.forEach(s=>{
    const words=s.toLowerCase().split(/\s+/);
    for(let i=0;i<words.length;i++){
      if(words[i].startsWith(ql)){
        withPriority.push({s,priority:i,nextLetter:words[i].slice(ql.length)||''});
        break;
      }
    }
  });
  withPriority.sort((a,b)=>{
    if(a.priority!==b.priority)return a.priority-b.priority;
    if(a.priority===0)return a.nextLetter.localeCompare(b.nextLetter);
    return a.s.toLowerCase().split(/\s+/)[0].localeCompare(b.s.toLowerCase().split(/\s+/)[0]);
  });
  return withPriority.slice(0,5).map(x=>x.s);
}
async function aiParse(text){
  const txt=await callAI([{role:"user",content:`Extract food items from this text. Return ONLY a JSON array. Each item: {food,quantity,unit,calories,protein,carbs,fat,saturatedFat,polyFat,monoFat,cholesterol,fiber,sugar,sodium,potassium,calcium,iron,vitC,vitD,vitB12,zinc} (all numbers).\nText:\n${text}`}],2000);
  const arr=JSON.parse(txt.replace(/```json|```/g,"").trim());
  return Array.isArray(arr)?arr:[];
}

// ── Small components ──────────────────────────────────────────────────────────
function Lbl({children}){return html`<div style=${{fontSize:10,color:C.muted,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:6}}>${children}</div>`;}
function Btn({onClick,disabled,color,children,style={}}){return html`<button onClick=${onClick} disabled=${disabled} style=${{width:"100%",padding:"13px",borderRadius:10,border:"none",cursor:disabled?"not-allowed":"pointer",background:disabled?C.border:(color||C.green),color:C.bg,fontSize:14,fontWeight:700,fontFamily:"Georgia,serif",opacity:disabled?0.5:1,...style}}>${children}</button>`;}

function MacroBar({label,value,goal,color,showPct}){
  const pct=Math.min((value/goal)*100,100),over=value>goal;
  return html`<div style=${{marginBottom:8}}>
    <div style=${{display:"flex",justifyContent:"space-between",marginBottom:3}}>
      <span style=${{fontSize:11,color:C.muted,letterSpacing:"0.07em",textTransform:"uppercase"}}>${label}</span>
      <span style=${{fontSize:11,color:over?C.red:C.text,fontFamily:"monospace"}}>
        ${Math.round(value)}<span style=${{color:C.muted}}>/${goal}g</span>
        ${showPct&&html`<span style=${{marginLeft:6,color:over?C.red:C.accent}}>${Math.round(pct)}%</span>`}
      </span>
    </div>
    <div style=${{height:5,background:C.border,borderRadius:3,overflow:"hidden"}}>
      <div style=${{height:"100%",width:`${pct}%`,background:over?C.red:color,borderRadius:3,transition:"width 0.5s ease"}}/>
    </div>
  </div>`;
}

function WeightChart({weights,target}){
  if(!weights.length)return null;
  const W=320,H=100,P={t:8,r:28,b:20,l:36};
  const vals=weights.map(w=>w.weight),dates=weights.map(w=>w.date);
  const all=target?[...vals,target]:vals;
  const mn=Math.min(...all)-0.5,mx=Math.max(...all)+0.5;
  const xOf=i=>P.l+(i/(weights.length-1||1))*(W-P.l-P.r);
  const yOf=v=>P.t+((mx-v)/(mx-mn))*(H-P.t-P.b);
  const pathD=vals.map((v,i)=>`${i===0?"M":"L"}${xOf(i).toFixed(1)},${yOf(v).toFixed(1)}`).join(" ");
  const areaD=`${pathD} L${xOf(vals.length-1).toFixed(1)},${H-P.b} L${xOf(0).toFixed(1)},${H-P.b} Z`;
  const tY=target?yOf(target):null;
  const ticks=weights.length<=5?weights.map((_,i)=>i):[0,Math.floor(weights.length/2),weights.length-1];
  return html`<svg width="100%" viewBox=${`0 0 ${W} ${H}`} style=${{display:"block"}}>
    <defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stopColor=${C.accent} stopOpacity="0.3"/>
      <stop offset="100%" stopColor=${C.accent} stopOpacity="0"/>
    </linearGradient></defs>
    ${[0,0.5,1].map(t=>{const y=P.t+t*(H-P.t-P.b),v=mx-t*(mx-mn);return html`<g key=${t}><line x1=${P.l} y1=${y} x2=${W-P.r} y2=${y} stroke=${C.border} strokeDasharray="3,3"/><text x=${P.l-3} y=${y+3} fontSize="9" fill=${C.muted} textAnchor="end">${v.toFixed(1)}</text></g>`;})}
    ${tY&&html`<line x1=${P.l} y1=${tY} x2=${W-P.r} y2=${tY} stroke=${C.green} strokeDasharray="4,3" strokeWidth="1.5"/><text x=${W-P.r+2} y=${tY+3} fontSize="8" fill=${C.green}>Goal</text>`}
    ${vals.length>1&&html`<path d=${areaD} fill="url(#wg)"/>`}
    ${vals.length>1&&html`<path d=${pathD} fill="none" stroke=${C.accent} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>`}
    ${vals.map((v,i)=>html`<circle key=${i} cx=${xOf(i)} cy=${yOf(v)} r="3.5" fill=${C.accent}/>`)}
    ${ticks.map(i=>html`<text key=${i} x=${xOf(i)} y=${H-2} fontSize="8" fill=${C.muted} textAnchor="middle">${fmtShort(dates[i])}</text>`)}
  </svg>`;
}

function SuggestDropdown({suggestions,loading,onSelect}){
  if(!loading&&!suggestions.length)return null;
  return html`<div style=${{position:"absolute",width:"100%",background:C.card,border:`1px solid ${C.accent}`,borderRadius:8,marginTop:2,zIndex:50,overflow:"hidden",boxShadow:"0 4px 12px rgba(0,0,0,0.4)"}}>
    ${loading&&html`<div style=${{padding:"10px 14px",fontSize:12,color:C.muted}}>🔍 Searching…</div>`}
    ${suggestions.map((s,i)=>html`<div key=${i}
      onMouseDown=${e=>{e.preventDefault();onSelect(s);}}
      onTouchEnd=${e=>{e.preventDefault();onSelect(s);}}
      style=${{padding:"9px 14px",borderBottom:i<suggestions.length-1?`1px solid ${C.border}`:"none",cursor:"pointer",fontSize:13,color:C.text}}>${s}</div>`)}
  </div>`;
}

function IngredientModal({show,editData,onSave,onClose,apiKey}){
  const [data,setData]=useState(editData||{food:"",quantity:"",unit:"g",...emptyNut()});
  const [msg,setMsg]=useState("");
  const [loading,setLoading]=useState(false);
  const [sugg,setSugg]=useState([]);
  const [suggLoad,setSuggLoad]=useState(false);
  const timer=useRef(null);
  const nameRef=useRef(null);
  useEffect(()=>{if(show){setData(editData||{food:"",quantity:"",unit:"g",...emptyNut()});setMsg("");setSugg([]);setTimeout(()=>nameRef.current&&nameRef.current.focus(),100);};},[show,editData]);
  if(!show)return null;
  const fetchSugg=async(q)=>{if(q.length<2){setSugg([]);return;}setSuggLoad(true);try{const r=await aiSuggest(q);setSugg(r);}catch{setSugg([]);}setSuggLoad(false);};
  const onNameChange=v=>{setData(p=>({...p,food:v}));clearTimeout(timer.current);timer.current=setTimeout(()=>fetchSugg(v),500);};
  const doAI=async()=>{
    if(!data.food.trim()||!data.quantity){setMsg("⚠ Enter name and quantity first.");return;}
    setLoading(true);setMsg("⏳ Looking up…");
    try{const r=await aiNutrition(data.food,data.quantity,data.unit);setData(p=>({...p,...r}));setMsg("✓ Filled!");}
    catch(e){setMsg("⚠ "+e.message);}
    setLoading(false);
  };
  const UNITS=["g","ml","piece","tsp","tbsp","cup","serving"];
  return html`<div className="mov" onClick=${onClose}>
    <div className="mbx" onClick=${e=>e.stopPropagation()}>
      <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style=${{fontSize:16,fontWeight:700}}>${editData?._id?"Edit Ingredient":"Add Ingredient"}</div>
        <button onClick=${onClose} style=${{background:"none",border:"none",color:C.muted,fontSize:22,cursor:"pointer"}}>✕</button>
      </div>
      <div style=${{marginBottom:10}}>
        <${Lbl}>Ingredient Name<//>
        <div style=${{position:"relative"}}>
          <input ref=${nameRef} value=${data.food} onInput=${e=>onNameChange(e.target.value)}
            onBlur=${()=>setTimeout(()=>setSugg([]),200)}
            placeholder="e.g. Egg, Chicken, Rice…" style=${IS} autoComplete="off"/>
          <${SuggestDropdown} suggestions=${sugg} loading=${suggLoad} onSelect=${v=>{setData(p=>({...p,food:v}));setSugg([]);}}/>
        </div>
      </div>
      <div style=${{marginBottom:8}}>
        <${Lbl}>Quantity<//>
        <input value=${data.quantity} onInput=${e=>setData(p=>({...p,quantity:e.target.value}))} inputMode="decimal" placeholder="100" style=${IS}/>
      </div>
      <div style=${{marginBottom:12}}>
        <${Lbl}>Unit<//>
        <div style=${{display:"flex",gap:5,flexWrap:"wrap"}}>
          ${UNITS.map(u=>html`<button key=${u} onClick=${()=>setData(p=>({...p,unit:u}))} style=${{padding:"7px 12px",borderRadius:18,border:`1px solid ${data.unit===u?C.accent:C.border}`,background:data.unit===u?C.accent:"none",color:data.unit===u?C.bg:C.muted,fontSize:12,cursor:"pointer",fontFamily:"inherit",fontWeight:data.unit===u?700:400}}>${u}</button>`)}
        </div>
      </div>
      <${Btn} onClick=${doAI} disabled=${loading||!data.food.trim()||!data.quantity} color=${`linear-gradient(135deg,${C.accent},${C.accentDim})`} style=${{marginBottom:6}}>${loading?"⏳ Looking up…":"✨ AI Fill Nutrition"}<//>
      ${msg&&html`<div style=${{fontSize:11,color:msg.startsWith("✓")?C.green:C.red,marginBottom:10,textAlign:"center"}}>${msg}</div>`}
      <div style=${{background:C.bg,border:`1px solid ${C.border}`,borderRadius:10,padding:12,marginBottom:14}}>
        <div style=${{fontSize:10,color:C.accent,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:8}}>Macronutrients</div>
        <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:5,marginBottom:8}}>

                    ${[{key:"protein",label:"Protein",color:C.blue},{key:"carbs",label:"Carbs",color:C.orange},{key:"fat",label:"Fat",color:C.accentDim},{key:"fiber",label:"Fiber",color:C.green},{key:"sodium",label:"Sodium",color:C.purple},{key:"calcium",label:"Calcium",color:C.purple}].map(({key,label,color})=>{
                      const pct=pGoals[key]?Math.round((mt[key]/pGoals[key])*100):0;
                      const fld=ALL_FIELDS.find(f=>f.key===key);
                      return html`<div key=${key} style=${{background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 9px"}}>
                        <div style=${{fontSize:9,color:C.muted,marginBottom:2}}>${label}</div>
                        <div style=${{fontSize:12,fontWeight:700,fontFamily:"monospace",color}}>${pct}%</div>
                        <div style=${{fontSize:9,color:C.muted}}>${mt[key]<1?mt[key].toFixed(1):Math.round(mt[key])}${fld?.unit||"g"}</div>
                      </div>`;
                    })}
                  </div>
                </div>`)}
              </div>
            </div>`;
          })()}
        </div>`}
<div style=${{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:C.bg,borderTop:`1px solid ${C.border}`,display:"flex",zIndex:20,paddingBottom:"env(safe-area-inset-bottom,0)"}}>
        ${TABS.map(({id,icon,label})=>html`<button key=${id} onClick=${()=>{setTab(id);setView("main");}} style=${{flex:1,padding:"11px 0 13px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
          <span style=${{fontSize:20}}>${icon}</span>
          <span style=${{fontSize:10,letterSpacing:"0.06em",textTransform:"uppercase",color:tab===id?C.accent:C.muted,fontWeight:tab===id?700:400,fontFamily:"inherit"}}>${label}</span>
        </button>`)}
      </div>
      ${tab==="diary"&&view==="main"&&html`<button onClick=${()=>{setAddMeal(getMealByTime());setView("add");}} style=${{position:"fixed",bottom:80,right:18,width:56,height:56,borderRadius:"50%",background:`linear-gradient(135deg,${C.accent},${C.accentDim})`,border:"none",color:C.bg,fontSize:26,cursor:"pointer",boxShadow:"0 4px 20px rgba(232,197,71,0.4)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>+</button>`}
    </div>`;
}

render(html`<${App}/>`, document.getElementById('app'));
</script>

<button id="install-banner" style="display:none">
  <img src="icon-192.png" alt="Food Journal"/>
  <div className="txt"><strong>Install Food Journal</strong><span>Add to home screen</span></div>
  <span className="arrow">📲</span>
  <button id="install-dismiss">✕</button>
</button>
<script>
let dp=null;
const bn=document.getElementById('install-banner');
const dm=document.getElementById('install-dismiss');
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();dp=e;setTimeout(()=>bn.classList.add('show'),2000);});
bn.addEventListener('click',async e=>{if(e.target===dm||dm.contains(e.target)){bn.classList.remove('show');return;}if(!dp)return;bn.classList.remove('show');dp.prompt();await dp.userChoice;dp=null;});
dm.addEventListener('click',e=>{e.stopPropagation();bn.classList.remove('show');});
window.addEventListener('appinstalled',()=>{bn.classList.remove('show');dp=null;});
if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>{});});}
</script>
</body>
</html>
