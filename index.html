<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Food Journal</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:#fff;
}
button{
  padding:10px 16px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
.container{
  padding:20px;
}
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:flex;
  align-items:center;
  justify-content:center;
}
.box{
  background:#222;
  padding:20px;
  border-radius:12px;
  width:300px;
  text-align:center;
}
</style>
</head>

<body>

<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/preact@10/dist/preact.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/preact@10/hooks/dist/hooks.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/htm@3/dist/htm.umd.js"></script>

<script>
const {h, render} = preact;
const {useState, useEffect, useRef} = preactHooks;
const html = htm.bind(h);

function App(){

  const [view,setView]=useState("main");
  const [showExit,setShowExit]=useState(false);

  const viewRef = useRef(view);

  useEffect(()=>{
    viewRef.current = view;
  },[view]);

  // ✅ Push state ONCE
  useEffect(()=>{
    history.pushState({app:true},"","");
  },[]);

  // ✅ Clean back handler (NO infinite push)
  useEffect(()=>{
    const onBack = () => {

      if(viewRef.current !== "main"){
        setView("main");
      }else{
        setShowExit(true);
      }

    };

    window.addEventListener("popstate", onBack);
    return () => window.removeEventListener("popstate", onBack);
  },[]);

  return html`
    <div class="container">

      <h2>Food Journal</h2>

      ${view==="main" && html`
        <div>
          <button onClick=${()=>setView("add")}>Add Food</button>
        </div>
      `}

      ${view==="add" && html`
        <div>
          <p>Add food screen</p>
          <button onClick=${()=>setView("main")}>Back</button>
        </div>
      `}

      ${showExit && html`
        <div class="modal" onClick=${()=>setShowExit(false)}>
          <div class="box" onClick=${e=>e.stopPropagation()}>
            <h3>Exit App?</h3>
            <p>Your data is saved.</p>

            <div style="display:flex;gap:10px;">
              <button style="flex:1;background:#555"
                onClick=${()=>setShowExit(false)}>
                Stay
              </button>

              <button style="flex:1;background:red;color:#fff"
                onClick=${()=>{
                  setShowExit(false);

                  // ✅ Proper exit logic
                  if(history.length > 1){
                    history.back();
                  }else{
                    window.close();
                  }
                }}>
                Exit
              </button>
            </div>

          </div>
        </div>
      `}

    </div>
  `;
}

render(html`<${App}/>`, document.getElementById("app"));
</script>

</body>
</html>
