const fmtDate=d=>{const dt=new Date(d+"T00:00:00");return `${dt.getFullYear()}-${dt.toLocaleDateString("en-US",{month:"long"})}-${String(dt.getDate()).padStart(2,"0")}`;};
const fmtMonth=d=>new Date(d+"T00:00:00").toLocaleDateString("en-US",{month:"long"});
const fmtShort=d=>new Date(d+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"});
const isoWeek=d=>{const dt=new Date(d+"T00:00:00"),j=new Date(dt.getFullYear(),0,1);return Math.ceil(((dt-j)/86400000+j.getDay()+1)/7);};
const isoMonth=d=>d.slice(0,7);
const emptyNut=()=>Object.fromEntries(ALL_FIELDS.map(f=>[f.key,""]));
const sumE=list=>{const o=Object.fromEntries(ALL_FIELDS.map(f=>[f.key,0]));list.forEach(e=>ALL_FIELDS.forEach(f=>{o[f.key]+=(Number(e[f.key])||0);}));return o;};
const n2s=v=>v===undefined||v===null||v===""?"0":String(Math.round(Number(v)*10)/10);
function getMealByTime(){
  const h=new Date().getHours(),m=new Date().getMinutes(),t=h*60+m;
  if(t<660)return"Breakfast";       // before 11:00
  if(t<720)return"Mid-Morning";     // 11:00-11:59
  if(t<900)return"Lunch";           // 12:00-14:59
  if(t<1020)return"Evening";        // 15:00-16:59
  return"Dinner";                    // 17:00+
}
function getMealByTimeFromTags(tags){
  if(!tags||!tags.length)return getMealByTime();
  const current=getMealByTime();
  return tags.includes(current)?current:tags[0];
}

// ── AI helpers ────────────────────────────────────────────────────────────────
async function callAI(messages,maxTokens=600){
  const key=localStorage.getItem(SK.apiKey)||"";
  if(!key){throw new Error("No API key");}
  const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key.trim(),"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:maxTokens,messages})});
  const d=await res.json();
  if(d.error)throw new Error(d.error.message);
  return d.content?.map(b=>b.text||"").join("")||"";
}
async function aiNutrition(name,qty,unit){
  const txt=await callAI([{role:"user",content:`Nutrition for ${qty} ${unit} of ${name}. Reply ONLY with this JSON:\n{"calories":0,"protein":0,"carbs":0,"fat":0,"saturatedFat":0,"polyFat":0,"monoFat":0,"cholesterol":0,"fiber":0,"sugar":0,"sodium":0,"potassium":0,"calcium":0,"magnesium":0,"iron":0,"zinc":0,"iodine":0,"vitA":0,"vitC":0,"vitD":0,"vitE":0,"vitB12":0,"folate":0}\nReplace 0s with correct numeric values.`}]);
  const p=JSON.parse(txt.replace(/```json|```/g,"").trim());
  const r={};ALL_FIELDS.forEach(f=>{const v=Number(p[f.key]);r[f.key]=isNaN(v)?"0":String(Math.round(v*10)/10);});
  return r;
}
async function aiSuggest(q){
  const txt=await callAI([{role:"user",content:`List 8 foods/ingredients where the name or any word in the name starts with "${q}". Reply ONLY with a JSON array of strings, no explanation.`}],150);
  const arr=JSON.parse(txt.replace(/```json|```/g,"").trim());
  if(!Array.isArray(arr))return[];
  const ql=q.toLowerCase();
  const qTokens=ql.trim().split(/\s+/).filter(Boolean);
  const withPriority=[];
  arr.forEach(s=>{
    const words=s.toLowerCase().split(/\s+/);
    if(!qTokens.length)return;
    for(let i=0;i<=words.length-qTokens.length;i++){
      const isMatch=qTokens.every((tok,j)=>words[i+j].startsWith(tok));
      if(isMatch){
        const lastWord=words[i+qTokens.length-1];
        const lastTok=qTokens[qTokens.length-1];
        withPriority.push({s,priority:i,nextLetter:lastWord.slice(lastTok.length)||''});
        break;
      }
    }
  });
  withPriority.sort((a,b)=>{
    if(a.priority!==b.priority)return a.priority-b.priority;
    if(a.priority===0)return a.nextLetter.localeCompare(b.nextLetter);
    return a.s.toLowerCase().split(/\s+/)[0].localeCompare(b.s.toLowerCase().split(/\s+/)[0]);
  });
  return withPriority.slice(0,5).map(x=>x.s);
}
async function aiParse(text){
  const txt=await callAI([{role:"user",content:`Extract food items from this text. Return ONLY a JSON array. Each item: {food,quantity,unit,calories,protein,carbs,fat,saturatedFat,polyFat,monoFat,cholesterol,fiber,sugar,sodium,potassium,calcium,magnesium,iron,zinc,iodine,vitA,vitC,vitD,vitE,vitB12,folate} (all numbers).\nText:\n${text}`}],2000);
  const arr=JSON.parse(txt.replace(/```json|```/g,"").trim());
  return Array.isArray(arr)?arr:[];
}

// ── Small components ──────────────────────────────────────────────────────────
function Lbl({children}){return html`<div style=${{fontSize:10,color:C.muted,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:6}}>${children}</div>`;}
function Btn({onClick,disabled,color,children,style={}}){return html`<button onClick=${onClick} disabled=${disabled} style=${{width:"100%",padding:"13px",borderRadius:10,border:"none",cursor:disabled?"not-allowed":"pointer",background:disabled?C.border:(color||C.green),color:C.bg,fontSize:14,fontWeight:700,fontFamily:"Georgia,serif",opacity:disabled?0.5:1,...style}}>${children}</button>`;}

function MacroBar({label,value,goal,color,showPct}){
  const rawPct=(value/goal)*100;
  const pct=Math.min(rawPct,100),over=value>goal;
  const excessPct=over?rawPct-100:0;
  return html`<div style=${{marginBottom:8}}>
    <div style=${{display:"flex",justifyContent:"space-between",marginBottom:3}}>
      <span style=${{fontSize:11,color:C.muted,letterSpacing:"0.07em",textTransform:"uppercase"}}>${label}</span>
      <span style=${{fontSize:11,color:over?C.red:C.text,fontFamily:"monospace"}}>
        ${Math.round(value)}<span style=${{color:C.muted}}>/${goal}g</span>
        ${showPct&&html`<span style=${{marginLeft:6,color:over?C.red:C.accent}}>${Math.round(pct)}%</span>`}
        ${showPct&&over&&html`<span style=${{marginLeft:4,color:C.red}}>(${`+${Math.round(excessPct)}%`})</span>`}
      </span>
    </div>
    <div style=${{height:5,background:C.border,borderRadius:3,overflow:"hidden"}}>
      <div style=${{height:"100%",width:`${pct}%`,background:over?C.red:color,borderRadius:3,transition:"width 0.5s ease"}}/>
    </div>
  </div>`;
}

function WeightChart({weights,target,onTap}){
  if(!weights.length)return null;
  const W=320,H=130,P={t:24,r:10,b:20,l:10};
  const MIN_W=50,MAX_W=100;
  const chartH=H-P.t-P.b,chartW=W-P.l-P.r;
  const n=weights.length;
  const barW=Math.min(28,Math.floor(chartW/n)-4);
  const xOf=i=>P.l+(i+0.5)*(chartW/n);
  const yOf=v=>P.t+chartH-((v-MIN_W)/(MAX_W-MIN_W))*chartH;
  const tY=target?yOf(Math.min(Math.max(target,MIN_W),MAX_W)):null;
  const ticks=n<=5?weights.map((_,i)=>i):[0,Math.floor(n/2),n-1];
  return html`<svg width="100%" viewBox=${`0 0 ${W} ${H}`} style=${{display:"block",cursor:onTap?"pointer":"default"}} onClick=${onTap}>
    ${[50,60,70,80,90,100].map(v=>{const y=yOf(v);return html`<g key=${v}>
      <line x1=${P.l} y1=${y} x2=${W-P.r} y2=${y} stroke=${C.border} strokeDasharray="2,3" strokeWidth="0.5"/>
    </g>`;})}
    ${tY&&html`<line x1=${P.l} y1=${tY} x2=${W-P.r} y2=${tY} stroke=${C.green} strokeDasharray="5,3" strokeWidth="1.5"/>
      <text x=${W-P.r-2} y=${tY-3} fontSize="8" fill=${C.green} textAnchor="end">Goal</text>`}
    ${weights.map((w,i)=>{
      const v=w.weight,bTop=yOf(v),bH=chartH-(bTop-P.t);
      const prev=i>0?weights[i-1].weight:null;
      const diff=prev!==null?Math.round((v-prev)*10)/10:null;
      const isUp=diff!==null&&diff>0;
      const barColor=diff===null?C.accent:isUp?C.red:C.green;
      const cx=xOf(i);
      return html`<g key=${i}>
        <rect x=${cx-barW/2} y=${bTop} width=${barW} height=${bH} rx="3" fill=${barColor} opacity="0.85"/>
        ${diff!==null&&html`<text x=${cx} y=${bTop-3} fontSize="7.5" fill=${barColor} textAnchor="middle" fontWeight="700">${isUp?"+":""}${diff}</text>`}
        <text x=${cx} y=${diff!==null?bTop-13:bTop-3} fontSize="7" fill=${C.muted} textAnchor="middle">${v}</text>
      </g>`;
    })}
    ${ticks.map(i=>html`<text key=${i} x=${xOf(i)} y=${H-2} fontSize="7.5" fill=${C.muted} textAnchor="middle">${fmtShort(weights[i].date)}</text>`)}
    ${onTap&&html`<rect x=${P.l} y=${P.t} width=${chartW} height=${chartH} fill="transparent" style=${{cursor:"pointer"}}/>`}
  </svg>`;
}

function WeightChartWeek({weights,target,onTap,chartType,onChartTypeChange}){
  if(!weights.length)return null;
  
  // Get current week data
  const now=new Date();
  const dow=now.getDay();
  const monday=new Date(now);monday.setDate(now.getDate()-(dow===0?6:dow-1));
  const currentWeekStart=monday.toISOString().split("T")[0];
  
  // Filter for current week
  const currentWeekWeights=[];
  for(let i=0;i<7;i++){
    const dt=new Date(monday);dt.setDate(monday.getDate()+i);
    const dateStr=dt.toISOString().split("T")[0];
    const weightEntry=weights.find(w=>w.date===dateStr);
    if(weightEntry){
      currentWeekWeights.push({...weightEntry,dateStr});
    }
  }
  
  // If no current week data, use last 7 days
  let displayWeights=currentWeekWeights.length>0?currentWeekWeights:[...weights].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,7);
  
  const W=320,H=140,P={t:26,r:20,b:22,l:10};
  const MIN_W=50,MAX_W=100;
  const chartH=H-P.t-P.b,chartW=W-P.l-P.r;
  const n=displayWeights.length;
  const barW=Math.min(28,Math.floor(chartW/n)-4);
  const xOf=i=>P.l+(i+0.5)*(chartW/n);
  const yOf=v=>P.t+chartH-((v-MIN_W)/(MAX_W-MIN_W))*chartH;
  const tY=target?yOf(Math.min(Math.max(target,MIN_W),MAX_W)):null;
  
  const formatDayLabel=w=>{
    const dt=new Date(w.date+"T00:00:00");
    const m=String(dt.getMonth()+1).padStart(2,"0");
    const d=String(dt.getDate()).padStart(2,"0");
    return `${m}/${d}`;
  };
  
  return html`<div style=${{position:"relative",overflow:"visible"}}>
    <svg width="100%" viewBox=${`0 0 ${W} ${H}`} overflow="visible" style=${{display:"block",cursor:onTap?"pointer":"default"}} onClick=${onTap}>
      ${[50,60,70,80,90,100].map(v=>{const y=yOf(v);return html`<g key=${v}>
        <line x1=${P.l} y1=${y} x2=${W-P.r} y2=${y} stroke=${C.border} strokeDasharray="2,3" strokeWidth="0.5"/>
      </g>`;})}
      ${tY&&html`<line x1=${P.l} y1=${tY} x2=${W-P.r} y2=${tY} stroke=${C.green} strokeDasharray="5,3" strokeWidth="1.5"/>
        <text x=${W-P.r-2} y=${tY-3} fontSize="8" fill=${C.green} textAnchor="end">Goal</text>`}
      ${chartType==="bar"&&displayWeights.map((w,i)=>{
        const v=w.weight,bTop=yOf(v),bH=chartH-(bTop-P.t);
        const prev=i>0?displayWeights[i-1].weight:null;
        const diff=prev!==null?Math.round((v-prev)*10)/10:null;
        const isUp=diff!==null&&diff>0;
        const barColor=diff===null?C.accent:isUp?C.red:C.green;
        const cx=xOf(i);
        return html`<g key=${i}>
          <rect x=${cx-barW/2} y=${bTop} width=${barW} height=${bH} rx="3" fill=${barColor} opacity="0.85"/>
          ${diff!==null&&html`<text x=${cx-5} y=${bTop-4} fontSize="6.5" fill=${barColor} textAnchor="middle" fontWeight="700">${isUp?"+":""}${diff}</text>`}
          <text x=${cx} y=${bTop+bH-4} fontSize="7" fill="#ffffff" textAnchor="middle" dominantBaseline="auto" fontWeight="700" transform=${`rotate(-90, ${cx}, ${bTop+bH-4})`}>${v}</text>
        </g>`;
      })}
      ${chartType==="line"&&displayWeights.length>1&&html`<path d=${displayWeights.map((w,i)=>`${i===0?"M":"L"} ${xOf(i)} ${yOf(w.weight)}`).join(" ")} fill="none" stroke=${C.accent} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/>`}
      ${chartType==="line"&&displayWeights.map((w,i)=>{
        const cx=xOf(i),cy=yOf(w.weight);
        const prev=i>0?displayWeights[i-1].weight:null;
        const diff=prev!==null?Math.round((w.weight-prev)*10)/10:null;
        const isUp=diff!==null&&diff>0;
        const pointColor=diff===null?C.accent:isUp?C.red:C.green;
        return html`<g key=${i}>
          <circle cx=${cx} cy=${cy} r="4" fill=${pointColor} stroke=${C.bg} strokeWidth="1" style=${{cursor:"pointer"}} onClick=${(e)=>{e.stopPropagation();onTap&&onTap(w);}}/>
          <text x=${cx} y=${cy-10} fontSize="7" fill=${C.text} textAnchor="middle" fontWeight="700">${w.weight}</text>
        </g>`;
      })}
      ${displayWeights.map((w,i)=>html`<text key=${i} x=${xOf(i)-5} y=${H-2} fontSize="7.5" fill=${C.muted} textAnchor="middle">${formatDayLabel(w)}</text>`)}
      ${onTap&&html`<rect x=${P.l} y=${P.t} width=${chartW} height=${chartH} fill="transparent" style=${{cursor:"pointer"}}/>`}
    </svg>
  </div>`;
}

function WeightChartLine({weights,target,onTap}){
  if(!weights.length)return null;
  const W=320,H=130,P={t:24,r:10,b:20,l:10};
  const MIN_W=50,MAX_W=100;
  const chartH=H-P.t-P.b,chartW=W-P.l-P.r;
  const n=weights.length;
  const xOf=i=>P.l+(i)*(chartW/(n-1));
  const yOf=v=>P.t+chartH-((v-MIN_W)/(MAX_W-MIN_W))*chartH;
  const tY=target?yOf(Math.min(Math.max(target,MIN_W),MAX_W)):null;
  const ticks=n<=7?weights.map((_,i)=>i):[0,Math.floor(n/2),n-1];
  
  // Create path for line
  const pathD=weights.map((w,i)=>`${i===0?"M":"L"} ${xOf(i)} ${yOf(w.weight)}`).join(" ");
  
  return html`<svg width="100%" viewBox=${`0 0 ${W} ${H}`} style=${{display:"block",cursor:onTap?"pointer":"default"}} onClick=${onTap}>
    ${[50,60,70,80,90,100].map(v=>{const y=yOf(v);return html`<g key=${v}>
      <line x1=${P.l} y1=${y} x2=${W-P.r} y2=${y} stroke=${C.border} strokeDasharray="2,3" strokeWidth="0.5"/>
    </g>`;})}
    ${tY&&html`<line x1=${P.l} y1=${tY} x2=${W-P.r} y2=${tY} stroke=${C.green} strokeDasharray="5,3" strokeWidth="1.5"/>
      <text x=${W-P.r-2} y=${tY-3} fontSize="8" fill=${C.green} textAnchor="end">Goal</text>`}
    ${weights.length>1&&html`<path d=${pathD} fill="none" stroke=${C.accent} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/>`}
    ${weights.map((w,i)=>{
      const cx=xOf(i),cy=yOf(w.weight);
      return html`<g key=${i}>
        <circle cx=${cx} cy=${cy} r="3.5" fill=${C.accent} stroke=${C.bg} strokeWidth="1"/>
        <text x=${cx} y=${cy-8} fontSize="7" fill=${C.text} textAnchor="middle" fontWeight="700">${w.weight}</text>
      </g>`;
    })}
    ${ticks.map(i=>{const dt=new Date(weights[i].date+"T00:00:00"),m=String(dt.getMonth()+1).padStart(2,"0"),d=String(dt.getDate()).padStart(2,"0");return html`<text key=${i} x=${xOf(i)} y=${H-2} fontSize="7.5" fill=${C.muted} textAnchor="middle">${m}/${d}</text>`;})}
    ${onTap&&html`<rect x=${P.l} y=${P.t} width=${chartW} height=${chartH} fill="transparent" style=${{cursor:"pointer"}}/>`}
  </svg>`;
}

${tab==="reports"&&view==="main"&&html`
        <div style=${{padding:"16px 18px"}}>
          <div style=${{display:"flex",background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:3,marginBottom:14,gap:3}}>
            ${[{label:"Daily",val:"daily"},{label:"Weekly",val:"weekly"},{label:"Monthly",val:"monthly"}].map(({label,val})=>html`
              <button key=${val} onClick=${()=>setRepPeriod(val)} style=${{flex:1,padding:"9px",borderRadius:7,border:"none",cursor:"pointer",background:repPeriod===val?C.accent:"none",color:repPeriod===val?C.bg:C.muted,fontSize:13,fontFamily:"inherit",fontWeight:repPeriod===val?700:400}}>${label}</button>`)}
          </div>
          ${repData.length===0?html`<div style=${{textAlign:"center",padding:"40px",color:C.muted}}>No data yet.</div>`:(()=>{
            const now=new Date(),daysInMonth=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
            const mult=repPeriod==="weekly"?7:repPeriod==="monthly"?daysInMonth:1;
            const pGoals=Object.fromEntries(ALL_FIELDS.map(f=>[f.key,(goals[f.key]||0)*mult]));
            const totals=(()=>{
              if(repPeriod==="daily"){return sumE(entries[todayStr()]||[]);}
              const cutDate=new Date();cutDate.setDate(cutDate.getDate()-(repPeriod==="weekly"?7:daysInMonth));
              const cutStr=cutDate.toISOString().split("T")[0];
              const inRange=Object.keys(entries).filter(d=>d>=cutStr);
              return sumE(inRange.flatMap(d=>entries[d]||[]));
            })();
            // Days with actual entries (not total period days)
            const daysWithEntries=(()=>{
              if(repPeriod==="daily")return 1;
              const cutDate=new Date();cutDate.setDate(cutDate.getDate()-(repPeriod==="weekly"?7:daysInMonth));
              const cutStr=cutDate.toISOString().split("T")[0];
              return Math.max(1,Object.keys(entries).filter(d=>d>=cutStr&&(entries[d]||[]).length>0).length);
            })();
            const mealTotals=MEAL_TYPES.map(m=>{
              if(repPeriod==="daily"){return{meal:m,totals:sumE((entries[todayStr()]||[]).filter(e=>e.meal===m))};}
              const cutDate=new Date();cutDate.setDate(cutDate.getDate()-(repPeriod==="weekly"?7:daysInMonth));
              const cutStr=cutDate.toISOString().split("T")[0];
              const inRange=Object.keys(entries).filter(d=>d>=cutStr);
              return{meal:m,totals:sumE(inRange.flatMap(d=>(entries[d]||[]).filter(e=>e.meal===m)))};
            }).filter(m=>m.totals.calories>0);
            const avgTotals=Object.fromEntries(ALL_FIELDS.map(f=>[f.key,(totals[f.key]||0)/daysWithEntries]));
            return html`<div>
              ${repPeriod!=="daily"&&html`<div onClick=${()=>openNutritionSummary(repPeriod==="weekly"?"Weekly Average Nutrition":"Monthly Average Nutrition",repPeriod==="weekly"?"Current week daily averages":"Current month daily averages",avgTotals)} style=${{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:16,marginBottom:14,cursor:"pointer"}}>
                <div style=${{fontSize:11,color:C.muted,marginBottom:4,letterSpacing:"0.06em",textTransform:"uppercase"}}>${repPeriod==="weekly"?"Current Week":"Current Month"} Average</div>
                <div style=${{display:"flex",alignItems:"baseline",gap:8}}>
                  <span style=${{fontSize:24,fontWeight:700,fontFamily:"monospace",color:C.accent}}>${Math.round(avgTotals.calories||0)}</span>
                  <span style=${{fontSize:12,color:C.muted}}>kcal / day</span>
                </div>
                <div style=${{fontSize:10,color:C.muted,marginTop:4}}>Based on ${daysWithEntries} day${daysWithEntries!==1?"s":""} with entries · Tap to view all nutrients</div>
              </div>`}
              <div style=${{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:16,marginBottom:14}}>
                <div style=${{fontSize:13,fontWeight:600,marginBottom:2}}>Achievement vs Goal</div>
                <div style=${{fontSize:11,color:C.muted,marginBottom:14}}>${repPeriod==="daily"?"Today's intake":repPeriod==="weekly"?"This week total":"This month total"} vs ${repPeriod==="daily"?"daily":repPeriod==="weekly"?`weekly (×7)`:`monthly (×${daysInMonth})`} goal</div>
                ${ALL_FIELDS.map(({key,label,unit:u,color})=>{
                  const g=pGoals[key];if(!g)return null;
                  const val=totals[key]||0,pct=Math.min(Math.round((val/g)*100),200),over=val>g;
                  const barColor=over?C.red:pct>=90?C.green:pct>=60?C.accent:C.muted;
                  const diff=val-g;
                  return html`<div key=${key} onClick=${()=>openRepDetail(key)} style=${{marginBottom:12,cursor:"pointer"}}>
                    <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                      <span style=${{fontSize:11,color:C.text}}>${label}</span>
                      <div style=${{display:"flex",alignItems:"center",gap:6}}>
                        <span style=${{fontSize:10,color:C.muted,fontFamily:"monospace"}}>${val<1?val.toFixed(1):Math.round(val)}/${Math.round(g)}${u}</span>
                        <span style=${{fontSize:10,fontFamily:"monospace",fontWeight:700,color:over?C.red:pct>=90?C.green:C.accent,background:over?"rgba(224,82,82,0.12)":pct>=90?"rgba(82,196,122,0.12)":"rgba(232,197,71,0.12)",padding:"1px 6px",borderRadius:5}}>${pct}%</span>
                        <span style=${{fontSize:9,color:over?C.red:C.green,fontFamily:"monospace"}}>${diff>0?"+":""}${diff<1&&diff>-1?diff.toFixed(1):Math.round(diff)}${u}</span>
                      </div>
                    </div>
                    <div style=${{height:5,background:C.border,borderRadius:3,overflow:"hidden"}}>
                      <div style=${{height:"100%",width:`${Math.min(pct,100)}%`,background:barColor,borderRadius:3,transition:"width 0.4s ease"}}/>
                    </div>
                  </div>`;
                })}
              </div>
              <div style=${{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:16,marginBottom:14}}>
                <div style=${{fontSize:13,fontWeight:600,marginBottom:4}}>Meal Contribution</div>
                <div style=${{fontSize:11,color:C.muted,marginBottom:14}}>${repPeriod==="daily"?"Today's meals":repPeriod==="weekly"?"This week's meals":"This month's meals"} vs ${repPeriod==="daily"?"daily":repPeriod==="weekly"?"weekly":"monthly"} goal</div>
                ${mealTotals.length===0?html`<div style=${{color:C.muted,fontSize:12}}>No meal data.</div>`:mealTotals.map(({meal,totals:mt})=>html`<div key=${meal} style=${{marginBottom:16}}>
                  <div style=${{display:"flex",alignItems:"center",gap:7,marginBottom:8}}>
                    <span>${MEAL_ICONS[meal]}</span><span style=${{fontSize:12,fontWeight:600}}>${meal}</span>
                    <span style=${{fontSize:11,color:C.accent,fontFamily:"monospace",marginLeft:"auto"}}>${Math.round(mt.calories)} kcal (${Math.round((mt.calories/pGoals.calories)*100)}%)</span>
                  </div>
                  <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
                    ${[{key:"protein",label:"Protein",color:C.blue},{key:"carbs",label:"Carbs",color:C.orange},{key:"fat",label:"Fat",color:C.accentDim},{key:"fiber",label:"Fiber",color:C.green},{key:"sugar",label:"Sugar",color:"#e07ab0"},{key:"sodium",label:"Sodium",color:C.purple}].map(({key,label,color})=>{
                      const pct=pGoals[key]?Math.round((mt[key]/pGoals[key])*100):0;
                      const fld=ALL_FIELDS.find(f=>f.key===key);
                      return html`<div key=${key} onClick=${()=>openRepDetail(key,meal)} style=${{background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 9px",cursor:"pointer"}}>
                        <div style=${{fontSize:9,color:C.muted,marginBottom:2}}>${label}</div>
                        <div style=${{fontSize:12,fontWeight:700,fontFamily:"monospace",color}}>${pct}%</div>
                        <div style=${{fontSize:9,color:C.muted}}>${mt[key]<1?mt[key].toFixed(1):Math.round(mt[key])}${fld?.unit||"g"}</div>
                      </div>`;
                    })}
                  </div>
                </div>`)}
              </div>
            </div>`;
          })()}
        </div>`}
${tab==="reports"&&view==="reports-history"&&html`
        <div style=${{padding:"16px 18px"}}>
          <div style=${{display:"flex",background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:3,marginBottom:14,gap:3}}>
            ${[{label:"Daily",val:"daily"},{label:"Weekly",val:"weekly"},{label:"Monthly",val:"monthly"}].map(({label,val})=>html`
              <button key=${val} onClick=${()=>setRepPeriod(val)} style=${{flex:1,padding:"9px",borderRadius:7,border:"none",cursor:"pointer",background:repPeriod===val?C.accent:"none",color:repPeriod===val?C.bg:C.muted,fontSize:13,fontFamily:"inherit",fontWeight:repPeriod===val?700:400}}>${label}</button>`)}
          </div>
          ${(()=>{
            const sortedDates=Object.keys(entries).sort((a,b)=>b.localeCompare(a));
            if(repPeriod==="daily"){
              return sortedDates.length===0?html`<div style=${{textAlign:"center",padding:"40px",color:C.muted}}>No report history yet.</div>`:
                sortedDates.map(d=>{
                  const t=sumE(entries[d]||[]);
                  const mult=1;
                  const overCal=t.calories>(goals.calories*mult);
                  const overP=t.protein>(goals.protein*mult);
                  const overC=t.carbs>(goals.carbs*mult);
                  const overF=t.fat>(goals.fat*mult);
                  const overFi=t.fiber>(goals.fiber*mult);
                  return html`<button key=${d} onClick=${()=>openNutritionSummary(`Daily Summary · ${fmtDate(d)}`,"Total nutrition for the day",t)} style=${{width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:13,padding:"13px 15px",marginBottom:8,cursor:"pointer",textAlign:"left",color:C.text,fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <div>
                      <div style=${{fontSize:13,fontWeight:600}}>${fmtDate(d)}</div>
                      <div style=${{fontSize:11,color:C.muted,marginTop:2}}>
                        <span style=${{color:overP?C.red:C.muted}}>P:${Math.round(t.protein)}g</span>
                        <span> </span>
                        <span style=${{color:overC?C.red:C.muted}}>C:${Math.round(t.carbs)}g</span>
                        <span> </span>
                        <span style=${{color:overF?C.red:C.muted}}>F:${Math.round(t.fat)}g</span>
                        <span> </span>
                        <span style=${{color:overFi?C.red:C.muted}}>Fi:${Math.round(t.fiber)}g</span>
                      </div>
                    </div>
                    <div style=${{textAlign:"right"}}>
                      <div style=${{fontSize:15,fontWeight:700,fontFamily:"monospace",color:overCal?C.red:C.accent}}>${Math.round(t.calories)}</div>
                      <div style=${{fontSize:9,color:C.muted}}>kcal</div>
                    </div>
                  </button>`;
                });
            }
            if(repPeriod==="weekly"){
              const buckets={};
              sortedDates.forEach(d=>{const dt=new Date(d+"T00:00:00");const dow=dt.getDay();const mon=new Date(dt);mon.setDate(dt.getDate()-(dow===0?6:dow-1));const sun=new Date(mon);sun.setDate(mon.getDate()+6);const key=mon.toISOString().split("T")[0];if(!buckets[key])buckets[key]={start:mon,end:sun,dates:[]};buckets[key].dates.push(d);});
              const weeks=Object.values(buckets).sort((a,b)=>b.start-a.start);
              return weeks.length===0?html`<div style=${{textAlign:"center",padding:"40px",color:C.muted}}>No report history yet.</div>`:
                weeks.map((w,i)=>{const t=sumE(w.dates.flatMap(d=>entries[d]||[]));const lbl=`${w.start.getDate()}-${w.end.getDate()}`;const mult=7;const overCal=t.calories>(goals.calories*mult),overP=t.protein>(goals.protein*mult),overC=t.carbs>(goals.carbs*mult),overF=t.fat>(goals.fat*mult),overFi=t.fiber>(goals.fiber*mult);return html`<button key=${i} onClick=${()=>openNutritionSummary(`Weekly Summary · ${lbl}`,"Consolidated weekly nutrition",t)} style=${{width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:13,padding:"13px 15px",marginBottom:8,cursor:"pointer",textAlign:"left",color:C.text,fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div><div style=${{fontSize:13,fontWeight:600}}>Week ${lbl}</div><div style=${{fontSize:11,color:C.muted,marginTop:2}}><span style=${{color:overP?C.red:C.muted}}>P:${Math.round(t.protein)}g</span> <span style=${{color:overC?C.red:C.muted}}>C:${Math.round(t.carbs)}g</span> <span style=${{color:overF?C.red:C.muted}}>F:${Math.round(t.fat)}g</span> <span style=${{color:overFi?C.red:C.muted}}>Fi:${Math.round(t.fiber)}g</span></div></div>
                  <div style=${{textAlign:"right"}}><div style=${{fontSize:15,fontWeight:700,fontFamily:"monospace",color:overCal?C.red:C.accent}}>${Math.round(t.calories)}</div><div style=${{fontSize:9,color:C.muted}}>kcal</div></div>
                </button>`;});
            }
            const months={};
            sortedDates.forEach(d=>{const mo=d.slice(0,7);if(!months[mo])months[mo]=[];months[mo].push(d);});
            const monthKeys=Object.keys(months).sort((a,b)=>b.localeCompare(a));
            return monthKeys.length===0?html`<div style=${{textAlign:"center",padding:"40px",color:C.muted}}>No report history yet.</div>`:
              monthKeys.map(mo=>{const t=sumE(months[mo].flatMap(d=>entries[d]||[]));const lbl=new Date(mo+"-01T00:00:00").toLocaleDateString("en-US",{month:"long",year:"numeric"});const dt=new Date(mo+"-01T00:00:00");const mult=new Date(dt.getFullYear(),dt.getMonth()+1,0).getDate();const overCal=t.calories>(goals.calories*mult),overP=t.protein>(goals.protein*mult),overC=t.carbs>(goals.carbs*mult),overF=t.fat>(goals.fat*mult),overFi=t.fiber>(goals.fiber*mult);return html`<button key=${mo} onClick=${()=>openNutritionSummary(`Monthly Summary · ${lbl}`,"Consolidated monthly nutrition",t)} style=${{width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:13,padding:"13px 15px",marginBottom:8,cursor:"pointer",textAlign:"left",color:C.text,fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div><div style=${{fontSize:13,fontWeight:600}}>${lbl}</div><div style=${{fontSize:11,color:C.muted,marginTop:2}}><span style=${{color:overP?C.red:C.muted}}>P:${Math.round(t.protein)}g</span> <span style=${{color:overC?C.red:C.muted}}>C:${Math.round(t.carbs)}g</span> <span style=${{color:overF?C.red:C.muted}}>F:${Math.round(t.fat)}g</span> <span style=${{color:overFi?C.red:C.muted}}>Fi:${Math.round(t.fiber)}g</span></div></div>
                <div style=${{textAlign:"right"}}><div style=${{fontSize:15,fontWeight:700,fontFamily:"monospace",color:overCal?C.red:C.accent}}>${Math.round(t.calories)}</div><div style=${{fontSize:9,color:C.muted}}>kcal</div></div>
              </button>`;});
          })()}
        </div>`}
<div style=${{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:C.bg,borderTop:`1px solid ${C.border}`,display:"flex",zIndex:20,paddingBottom:"env(safe-area-inset-bottom,0)"}}>
        ${TABS.map(({id,icon,label})=>html`<button key=${id} onClick=${()=>{setTab(id);setView("main");}} style=${{flex:1,padding:"11px 0 13px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
          <span style=${{fontSize:20}}>${icon}</span>
          <span style=${{fontSize:10,letterSpacing:"0.06em",textTransform:"uppercase",color:tab===id?C.accent:C.muted,fontWeight:tab===id?700:400,fontFamily:"inherit"}}>${label}</span>
        </button>`)}
      </div>
      ${tab==="diary"&&view==="main"&&html`<button onClick=${()=>{setAddMeal(getMealByTime());setView("add");}} style=${{position:"fixed",bottom:80,right:18,width:56,height:56,borderRadius:"50%",background:`linear-gradient(135deg,${C.accent},${C.accentDim})`,border:"none",color:C.bg,fontSize:26,cursor:"pointer",boxShadow:"0 4px 20px rgba(232,197,71,0.4)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>+</button>`}
    </div>`;
}

render(html`<${App}/>`, document.getElementById('app'));
</script>

<button id="install-banner" style="display:none">
  <img src="icon-192.png" alt="Food Journal"/>
  <div className="txt"><strong>Install Food Journal</strong><span>Add to home screen</span></div>
  <span className="arrow">📲</span>
  <button id="install-dismiss">✕</button>
</button>
<script>
let dp=null;
const bn=document.getElementById('install-banner');
const dm=document.getElementById('install-dismiss');
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();dp=e;setTimeout(()=>bn.classList.add('show'),2000);});
bn.addEventListener('click',async e=>{if(e.target===dm||dm.contains(e.target)){bn.classList.remove('show');return;}if(!dp)return;bn.classList.remove('show');dp.prompt();await dp.userChoice;dp=null;});
dm.addEventListener('click',e=>{e.stopPropagation();bn.classList.remove('show');});
window.addEventListener('appinstalled',()=>{bn.classList.remove('show');dp=null;});
if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>{});});}
</script>
