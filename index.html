<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#0f0e0c"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Food Journal"/>
<title>Food Journal</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#0f0e0c;color:#f0ece0;font-family:Georgia,'Times New Roman',serif;overscroll-behavior:none;}
#app{height:100%;}
input,select,textarea,button{font-family:Georgia,'Times New Roman',serif;}
::-webkit-scrollbar{display:none;}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
.mov{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
.mbx{background:#1a1917;border-radius:20px 20px 0 0;padding:20px 18px 32px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;}
#install-banner{display:none;position:fixed;bottom:90px;left:50%;transform:translateX(-50%);width:calc(100% - 36px);max-width:444px;background:linear-gradient(135deg,#e8c547,#b89c2f);color:#0f0e0c;border-radius:14px;padding:14px 18px;z-index:999;box-shadow:0 4px 24px rgba(232,197,71,0.5);align-items:center;gap:14px;cursor:pointer;border:none;font-family:Georgia,serif;}
#install-banner.show{display:flex!important;}
#install-banner img{width:44px;height:44px;border-radius:10px;flex-shrink:0;}
#install-banner .txt{flex:1;text-align:left;}
#install-banner .txt strong{display:block;font-size:14px;font-weight:700;margin-bottom:2px;}
#install-banner .txt span{font-size:11px;opacity:0.75;}
#install-dismiss{position:absolute;top:8px;right:10px;background:none;border:none;color:#0f0e0c;font-size:16px;cursor:pointer;opacity:0.6;padding:2px 6px;}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdn.jsdelivr.net/npm/preact@10/dist/preact.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/preact@10/hooks/dist/hooks.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/htm@3/dist/htm.umd.js"></script>
<script>
// --- SERVICE WORKER REGISTRATION (v30) ---
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then(reg => {
      reg.update();
      reg.onupdatefound = () => {
        const installingWorker = reg.installing;
        installingWorker.onstatechange = () => {
          if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
            window.location.reload();
          }
        };
      };
    }).catch(err => console.error('SW failed:', err));
  });
}

const {h, render} = preact;
const {useState, useEffect, useRef, useCallback} = preactHooks;
const html = htm.bind(h);

// ── Storage ──
const SK={entries:"fd-entries-v2",profile:"fd-profile-v2",weights:"fd-weights-v2",recipes:"fd-recipebook-v2",apiKey:"fd-apikey-v1",autoBackup:"fd-autobackup-v1",lastBackup:"fd-lastbackup-v1"};
const store={
  get:k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
};

// ── Constants & Helpers ──
const DEFAULT_PROFILE={name:"Nasarudheen N",currentWeight:"81",targetWeight:"70",height:"175",calorieGoal:1800,protein:130,carbs:180,fat:55,fiber:25,sugar:50,saturatedFat:20,polyFat:10,monoFat:15,cholesterol:300,sodium:2300,potassium:3500,calcium:1000,iron:18,vitC:90,vitD:20,vitB12:2.4,zinc:11};
const C={bg:"#0f0e0c",card:"#1a1917",border:"#3a3835",accent:"#e8c547",accentDim:"#b89c2f",text:"#f0ece0",muted:"#7a7060",red:"#e05252",green:"#52c47a",blue:"#5299e0",orange:"#e08a52",purple:"#a07ee0"};
const ALL_FIELDS=[{key:"calories",label:"Calories",unit:"kcal",color:C.accent},{key:"protein",label:"Protein",unit:"g",color:C.blue},{key:"carbs",label:"Carbs",unit:"g",color:C.orange},{key:"fat",label:"Fat (Total)",unit:"g",color:C.accentDim},{key:"fiber",label:"Fiber",unit:"g",color:C.green}];
const todayStr=()=>new Date().toISOString().split("T")[0];

// ── Main App Component ──
function App() {
  const [entries, setEntries] = useState(() => store.get(SK.entries) || {});
  const [profile, setProfile] = useState(() => store.get(SK.profile) || DEFAULT_PROFILE);
  const [tab, setTab] = useState("diary");

  // Basic rendering logic to ensure page is not blank
  return html`
    <div style=${{height: '100%', display: 'flex', flexDirection: 'column'}}>
      <header style=${{padding: '20px', borderBottom: `1px solid ${C.border}`, textAlign: 'center'}}>
          <h1 style=${{fontSize: '20px', color: C.accent}}>Food Journal v30</h1>
      </header>

      <main style=${{flex: 1, padding: '20px', overflowY: 'auto'}}>
          <div style=${{background: C.card, padding: '15px', borderRadius: '12px', marginBottom: '20px'}}>
              <h2 style=${{fontSize: '16px', marginBottom: '5px'}}>Welcome, ${profile.name}</h2>
              <p style=${{color: C.muted, fontSize: '13px'}}>Ready to track your protein today?</p>
          </div>
          
          <div style=${{display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
              <span>${todayStr()}</span>
              <button style=${{background: C.green, color: C.bg, border: 'none', padding: '8px 16px', borderRadius: '8px', fontWeight: 'bold'}}>+ Log Food</button>
          </div>
      </main>

      <nav style=${{height: '70px', background: C.card, borderTop: `1px solid ${C.border}`, display: 'flex', justifyContent: 'space-around', alignItems: 'center'}}>
          <div onClick=${()=>setTab("diary")} style=${{color: tab==="diary"?C.accent:C.muted}}>📖 Diary</div>
          <div onClick=${()=>setTab("recipes")} style=${{color: tab==="recipes"?C.accent:C.muted}}>📚 Recipes</div>
          <div onClick=${()=>setTab("reports")} style=${{color: tab==="reports"?C.accent:C.muted}}>📊 Reports</div>
      </nav>
    </div>
  `;
}

render(html`<${App}/>`, document.getElementById('app'));
</script>
</body>
</html>
