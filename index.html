<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#0f0e0c"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Food Journal"/>
<title>Food Journal</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#0f0e0c;color:#f0ece0;font-family:Georgia,'Times New Roman',serif;overscroll-behavior:none;overflow:hidden;}
#app{height:100%;}
input,select,textarea,button{font-family:Georgia,'Times New Roman',serif;}
::-webkit-scrollbar{display:none;}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
.screen{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;background:#0f0e0c;overflow-y:auto;padding-bottom:100px;}
.fade-in{animation:fadeIn 0.3s ease-out;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div id="app"></div>
<script type="module">
import { h, render } from 'https://esm.sh/preact';
import { useState, useEffect } from 'https://esm.sh/preact/hooks';
import htm from 'https://esm.sh/htm';
const html = htm.bind(h);

const C = { bg: "#0f0e0c", card: "#1a1814", text: "#f0ece0", dim: "#a09880", accent: "#e8c547", accentDim: "#b09536", red: "#ff4d4d" };

function App() {
    const [view, setViewInternal] = useState('home');
    const [entries, setEntries] = useState(() => JSON.parse(localStorage.getItem('food_journal') || '[]'));

    // Custom function to handle view changes and history
    const setView = (newView, isBack = false) => {
        if (!isBack) {
            // Push new state to browser history so swipe back works
            history.pushState({ view: newView }, "");
        }
        setViewInternal(newView);
    };

    useEffect(() => {
        localStorage.setItem('food_journal', JSON.stringify(entries));
    }, [entries]);

    // Handle Browser/Android Back Button and Swipe
    useEffect(() => {
        // Set initial state
        history.replaceState({ view: 'home' }, "");

        const handlePopState = (event) => {
            if (event.state && event.state.view) {
                setViewInternal(event.state.view);
            } else {
                // If we are at the very beginning of history and they swipe back
                const confirmExit = confirm("Exit Food Journal?");
                if (confirmExit) {
                    // In most APKs this will close the app
                    window.close();
                } else {
                    // Push state back so they stay in app
                    history.pushState({ view: 'home' }, "");
                    setViewInternal('home');
                }
            }
        };

        window.addEventListener('popstate', handlePopState);
        return () => window.removeEventListener('popstate', handlePopState);
    }, []);

    // Helper: Format Date
    const getTodayDate = () => new Date().toISOString().split('T')[0];

    // Placeholder Views (Based on your original logic)
    return html`
        <div style=${{height:'100%', position:'relative'}}>
            ${view === 'home' && html`
                <div class="screen fade-in">
                    <h1 style=${{padding:'20px', color:C.accent}}>Food Journal</h1>
                    <div style=${{padding:'20px'}}>
                        <p>Welcome back. Keep track of your nutrition.</p>
                        <button onClick=${() => setView('list')} style=${{marginTop:'20px', padding:'10px', background:C.accent, border:'none', borderRadius:'5px'}}>View Entries</button>
                    </div>
                </div>
            `}

            ${view === 'list' && html`
                <div class="screen fade-in">
                    <h2 style=${{padding:'20px'}}>Recent Logs</h2>
                    <button onClick=${() => setView('home')} style=${{margin:'20px', color:C.dim, background:'none', border:'none'}}>← Back</button>
                </div>
            `}

            ${view === 'add' && html`
                <div class="screen fade-in">
                    <h2 style=${{padding:'20px'}}>Add Entry</h2>
                    <button onClick=${() => setView('home')} style=${{margin:'20px', color:C.dim, background:'none', border:'none'}}>Cancel</button>
                </div>
            `}

            <button onClick=${() => setView('add')} style=${{position:"fixed",bottom:80,right:18,width:56,height:56,borderRadius:"50%",background:`linear-gradient(135deg,${C.accent},${C.accentDim})`,border:"none",color:C.bg,fontSize:26,cursor:"pointer",boxShadow:"0 4px 20px rgba(232,197,71,0.4)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>+</button>
        </div>
    `;
}

render(html`<${App}/>`, document.getElementById('app'));
</script>
</body>
</html>
