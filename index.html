<script>
    let startX;
    let isSwiping = false;
    
    const handleTouchStart = (e) => {
        startX = e.touches[0].clientX;
    };
    
    const handleTouchMove = (e) => {
        const touchX = e.touches[0].clientX;
        if (startX - touchX > 100) { // Swipe from right to left
            isSwiping = true;
        }
    };
    
    const handleTouchEnd = () => {
        if (isSwiping) {
            // Logic for back navigation here
            window.history.back();
        }
        isSwiping = false;
    };
    
    document.addEventListener('touchstart', handleTouchStart);
    document.addEventListener('touchmove', handleTouchMove);
    document.addEventListener('touchend', handleTouchEnd);
    
    window.addEventListener('beforeunload', (e) => {
        // Display exit confirmation modal
        const confirmationMessage = 'Are you sure you want to close the app?';
        e.returnValue = confirmationMessage; // Modern browsers
        return confirmationMessage; // Legacy browsers
    });
</script>
