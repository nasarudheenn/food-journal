<!DOCTYPE html>
<html lang="en">
<head>

<meta name="theme-color" content="#0f0e0c"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>

<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#0f0e0c;color:#f0ece0;font-family:Georgia,'Times New Roman',serif;overscroll-behavior:none;}
#root{height:100%;}
input,select,textarea,button{font-family:Georgia,'Times New Roman',serif;}
::-webkit-scrollbar{display:none;}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
#install-banner{display:none;position:fixed;bottom:90px;left:50%;transform:translateX(-50%);width:calc(100% - 36px);max-width:444px;background:linear-gradient(135deg,#e8c547,#b89c2f);color:#0f0e0c;border-radius:14px;padding:14px 18px;z-index:999;box-shadow:0 4px 24px rgba(232,197,71,0.5);align-items:center;gap:14px;cursor:pointer;border:none;font-family:Georgia,serif;}
#install-banner.show{display:flex!important;}
#install-banner img{width:44px;height:44px;border-radius:10px;flex-shrink:0;}
#install-banner .txt{flex:1;text-align:left;}
#install-banner .txt strong{display:block;font-size:14px;font-weight:700;margin-bottom:2px;}
#install-banner .txt span{font-size:11px;opacity:0.75;}
#install-dismiss{position:absolute;top:8px;right:10px;background:none;border:none;color:#0f0e0c;font-size:16px;cursor:pointer;opacity:0.6;padding:2px 6px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
.modal-box{background:#1a1917;border-radius:20px 20px 0 0;padding:20px 18px 32px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef}=React;
const SK={entries:"fd-entries-v2",profile:"fd-profile-v2",weights:"fd-weights-v2",recipes:"fd-recipebook-v2",apiKey:"fd-apikey-v1"};
const store={
  get:k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
};
const HARDCODED_KEY="";
const DEFAULT_PROFILE={
  name:"Nasarudheen N",currentWeight:"81",targetWeight:"70",height:"175",
  calorieGoal:1800,protein:130,carbs:180,fat:55,fiber:25,
  sugar:50,saturatedFat:20,polyFat:10,monoFat:15,cholesterol:300,
  sodium:2300,potassium:3500,calcium:1000,iron:18,vitC:90,vitD:20,vitB12:2.4,zinc:11
};
const C={bg:"#0f0e0c",card:"#1a1917",border:"#3a3835",accent:"#e8c547",accentDim:"#b89c2f",text:"#f0ece0",muted:"#7a7060",red:"#e05252",green:"#52c47a",blue:"#5299e0",orange:"#e08a52",purple:"#a07ee0"};
const MEAL_TYPES=["Breakfast","Mid-Morning","Lunch","Evening","Dinner"];
const MEAL_ICONS={Breakfast:"☀️","Mid-Morning":"🫐",Lunch:"🥗",Evening:"🍎",Dinner:"🌙"};
const MACRO_FIELDS=[
  {key:"calories",label:"Calories",unit:"kcal",color:C.accent},
  {key:"protein",label:"Protein",unit:"g",color:C.blue},
  {key:"carbs",label:"Carbs",unit:"g",color:C.orange},
  {key:"fat",label:"Fat (Total)",unit:"g",color:C.accentDim},
  {key:"saturatedFat",label:"Saturated Fat",unit:"g",color:"#c4704a"},
  {key:"polyFat",label:"Polyunsat. Fat",unit:"g",color:"#7ab0e0"},
  {key:"monoFat",label:"Monounsat. Fat",unit:"g",color:"#a0c07a"},
  {key:"cholesterol",label:"Cholesterol",unit:"mg",color:"#d4a04a"},
  {key:"fiber",label:"Fiber",unit:"g",color:C.green},
  {key:"sugar",label:"Sugar",unit:"g",color:"#e07ab0"},
];
const MICRO_FIELDS=[
  {key:"sodium",label:"Sodium",unit:"mg"},
  {key:"potassium",label:"Potassium",unit:"mg"},
  {key:"calcium",label:"Calcium",unit:"mg"},
  {key:"iron",label:"Iron",unit:"mg"},
  {key:"vitC",label:"Vit C",unit:"mg"},
  {key:"vitD",label:"Vit D",unit:"μg"},
  {key:"vitB12",label:"Vit B12",unit:"μg"},
  {key:"zinc",label:"Zinc",unit:"mg"},
];
const ALL_FIELDS=[...MACRO_FIELDS,...MICRO_FIELDS];
const TABS=[{id:"diary",icon:"📖",label:"Diary"},{id:"recipes",icon:"📚",label:"Recipes"},{id:"reports",icon:"📊",label:"Reports"},{id:"profile",icon:"👤",label:"Profile"}];
const todayStr=()=>new Date().toISOString().split("T")[0];
const fmtDate=d=>new Date(d+"T00:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
const fmtShort=d=>new Date(d+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"});
const isoWeek=d=>{const dt=new Date(d+"T00:00:00"),j=new Date(dt.getFullYear(),0,1);return Math.ceil(((dt-j)/86400000+j.getDay()+1)/7);};
const isoMonth=d=>d.slice(0,7);
const emptyNut=()=>Object.fromEntries(ALL_FIELDS.map(f=>[f.key,""]));
const sumE=list=>{const o=Object.fromEntries(ALL_FIELDS.map(f=>[f.key,0]));list.forEach(e=>ALL_FIELDS.forEach(f=>{o[f.key]+=(Number(e[f.key])||0);}));return o;};
const IS={width:"100%",padding:"10px 12px",background:"#222120",border:"1px solid #4a4845",borderRadius:9,color:"#f0ece0",fontSize:14,fontFamily:"Georgia,serif",outline:"none",boxSizing:"border-box"};
function Lbl({children}){return <div style={{fontSize:10,color:C.muted,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:6}}>{children}</div>;}
function Btn({onClick,disabled,color,children,style={}}){return <button onClick={onClick} disabled={disabled} style={{width:"100%",padding:"13px",borderRadius:10,border:"none",cursor:disabled?"not-allowed":"pointer",background:disabled?C.border:(color||C.green),color:C.bg,fontSize:14,fontWeight:700,fontFamily:"Georgia,serif",opacity:disabled?0.5:1,...style}}>{children}</button>;}
function MacroBar({label,value,goal,color,showPct}){
  const pct=Math.min((value/goal)*100,100),over=value>goal;
  return(
    <div style={{marginBottom:8}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
        <span style={{fontSize:11,color:C.muted,letterSpacing:"0.07em",textTransform:"uppercase"}}>{label}</span>
        <span style={{fontSize:11,color:over?C.red:C.text,fontFamily:"monospace"}}>
          {Math.round(value)}<span style={{color:C.muted}}>/{goal}g</span>
          {showPct&&<span style={{marginLeft:6,color:over?C.red:C.accent}}>{Math.round(pct)}%</span>}
        </span>
      </div>
      <div style={{height:5,background:C.border,borderRadius:3,overflow:"hidden"}}>
        <div style={{height:"100%",width:`${pct}%`,background:over?C.red:color,borderRadius:3,transition:"width 0.5s ease"}}/>
      </div>
    </div>
  );
}
function Badge({label,value,goal,unit,color}){
  return(
    <div style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"7px 5px",textAlign:"center",flex:1,minWidth:0}}>
      <div style={{fontSize:12,fontWeight:700,color:color||C.text,fontFamily:"monospace",whiteSpace:"nowrap"}}>{Math.round(value)}<span style={{fontSize:8,color:C.muted}}>/{goal}{unit}</span></div>
      <div style={{fontSize:8,color:C.muted,marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{label}</div>
    </div>
  );
}
function WeightChart({weights,target}){
  if(!weights.length)return null;
  const W=320,H=100,P={t:8,r:28,b:20,l:36};
  const vals=weights.map(w=>w.weight),dates=weights.map(w=>w.date);
  const all=target?[...vals,target]:vals;
  const mn=Math.min(...all)-0.5,mx=Math.max(...all)+0.5;
  const xOf=i=>P.l+(i/(weights.length-1||1))*(W-P.l-P.r);
  const yOf=v=>P.t+((mx-v)/(mx-mn))*(H-P.t-P.b);
  const pathD=vals.map((v,i)=>`${i===0?"M":"L"}${xOf(i).toFixed(1)},${yOf(v).toFixed(1)}`).join(" ");
  const areaD=`${pathD} L${xOf(vals.length-1).toFixed(1)},${H-P.b} L${xOf(0).toFixed(1)},${H-P.b} Z`;
  const tY=target?yOf(target):null;
  const ticks=weights.length<=5?weights.map((_,i)=>i):[0,Math.floor(weights.length/2),weights.length-1];
  return(
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{display:"block"}}>
      <defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={C.accent} stopOpacity="0.3"/><stop offset="100%" stopColor={C.accent} stopOpacity="0"/></linearGradient></defs>
      {[0,0.5,1].map(t=>{const y=P.t+t*(H-P.t-P.b),v=mx-t*(mx-mn);return(<g key={t}><line x1={P.l} y1={y} x2={W-P.r} y2={y} stroke={C.border} strokeDasharray="3,3"/><text x={P.l-3} y={y+3} fontSize="9" fill={C.muted} textAnchor="end">{v.toFixed(1)}</text></g>);})}
      {tY&&<><line x1={P.l} y1={tY} x2={W-P.r} y2={tY} stroke={C.green} strokeDasharray="4,3" strokeWidth="1.5"/><text x={W-P.r+2} y={tY+3} fontSize="8" fill={C.green}>Goal</text></>}
      {vals.length>1&&<path d={areaD} fill="url(#wg)"/>}
      {vals.length>1&&<path d={pathD} fill="none" stroke={C.accent} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>}
      {vals.map((v,i)=><circle key={i} cx={xOf(i)} cy={yOf(v)} r="3.5" fill={C.accent}/>)}
      {ticks.map(i=><text key={i} x={xOf(i)} y={H-2} fontSize="8" fill={C.muted} textAnchor="middle">{fmtShort(dates[i])}</text>)}
    </svg>
  );
}
// Nutrition detail modal
function NutModal({item,onClose}){
  if(!item)return null;
  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div>
            <div style={{fontSize:16,fontWeight:700}}>{item.food}</div>
            <div style={{fontSize:11,color:C.muted}}>{item.quantity}</div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",color:C.muted,fontSize:22,cursor:"pointer"}}>✕</button>
        </div>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:10,color:C.accent,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:8,fontWeight:600}}>Macronutrients</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {MACRO_FIELDS.map(({key,label,unit:u,color})=>(
              <div key={key} style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 11px"}}>
                <div style={{fontSize:10,color:C.muted,marginBottom:2}}>{label}</div>
                <div style={{fontSize:16,fontWeight:700,fontFamily:"monospace",color}}>{Number(item[key]||0)<1?(Number(item[key]||0)).toFixed(1):Math.round(Number(item[key]||0))}<span style={{fontSize:9,color:C.muted}}>{u}</span></div>
              </div>
            ))}
          </div>
        </div>
        <div>
          <div style={{fontSize:10,color:C.purple,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:8,fontWeight:600}}>Micronutrients</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {MICRO_FIELDS.map(({key,label,unit:u})=>(
              <div key={key} style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 11px"}}>
                <div style={{fontSize:10,color:C.muted,marginBottom:2}}>{label}</div>
                <div style={{fontSize:16,fontWeight:700,fontFamily:"monospace",color:C.purple}}>{Number(item[key]||0)<1?(Number(item[key]||0)).toFixed(1):Math.round(Number(item[key]||0))}<span style={{fontSize:9,color:C.muted}}>{u}</span></div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}
// Confirm delete modal
function ConfirmModal({msg,onConfirm,onCancel}){
  return(
    <div className="modal-overlay" onClick={onCancel}>
      <div className="modal-box" onClick={e=>e.stopPropagation()} style={{borderRadius:20}}>
        <div style={{fontSize:36,textAlign:"center",marginBottom:12}}>⚠️</div>
        <div style={{fontSize:15,fontWeight:700,textAlign:"center",marginBottom:8}}>Delete Item?</div>
        <div style={{fontSize:13,color:C.muted,textAlign:"center",marginBottom:20,lineHeight:1.6}}>{msg}</div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={onCancel} style={{flex:1,padding:"12px",background:"none",border:`1px solid ${C.border}`,borderRadius:10,color:C.muted,fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Cancel</button>
          <button onClick={onConfirm} style={{flex:1,padding:"12px",background:C.red,border:"none",borderRadius:10,color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Delete</button>
        </div>
      </div>
    </div>
  );
}

function App(){
  const [entries,setEntries]=useState(()=>store.get(SK.entries)||{});
  const [profile,setProfile]=useState(()=>{const p=store.get(SK.profile);return p?{...DEFAULT_PROFILE,...p}:DEFAULT_PROFILE;});
  const [weights,setWeights]=useState(()=>store.get(SK.weights)||[]);
  const [recipeBook,setRecipeBook]=useState(()=>store.get(SK.recipes)||[]);
  const [tab,setTab]=useState("diary");
  const [view,setView]=useState("main");
  const [selDate,setSelDate]=useState(todayStr());
  const [expR,setExpR]=useState({});
  // Modals
  const [nutModal,setNutModal]=useState(null);
  const [confirmModal,setConfirmModal]=useState(null);
  // Add food
  const [addMeal,setAddMeal]=useState("Breakfast");
  const [logMode,setLogMode]=useState("recipe");
  const [foodName,setFoodName]=useState("");
  const [qty,setQty]=useState("");
  const [unit,setUnit]=useState("g");
  const [nut,setNut]=useState(emptyNut());
  const [loading,setLoading]=useState(false);
  const [aiMsg,setAiMsg]=useState("");
  const [importTxt,setImportTxt]=useState("");
  const [impLoading,setImpLoading]=useState(false);
  const [impStatus,setImpStatus]=useState("");
  const [parsed,setParsed]=useState([]);
  const [impName,setImpName]=useState("");
  // Profile
  const [profEdit,setProfEdit]=useState(()=>{const p=store.get(SK.profile);return p?{...DEFAULT_PROFILE,...p}:DEFAULT_PROFILE;});
  const [newWt,setNewWt]=useState("");
  // API Key - prefilled
  const [apiKey,setApiKey]=useState(()=>localStorage.getItem(SK.apiKey)||HARDCODED_KEY);
  const [apiKeyInput,setApiKeyInput]=useState(()=>localStorage.getItem(SK.apiKey)||HARDCODED_KEY);
  const [apiKeyMsg,setApiKeyMsg]=useState("");
  // Recipes
  const [editRecId,setEditRecId]=useState(null); // id of recipe being edited inline
  const [editRecData,setEditRecData]=useState({}); // {id:{name,items,mealTags}}
  const [useRec,setUseRec]=useState(null);
  const [useQtys,setUseQtys]=useState({});
  const [useMeal,setUseMeal]=useState("Lunch");
  const [recName,setRecName]=useState("");
  const [recItems,setRecItems]=useState([]);
  const [recTags,setRecTags]=useState([]);
  const [recAiMsg,setRecAiMsg]=useState("");
  const [recLoad,setRecLoad]=useState(false);
  const [recImportMode,setRecImportMode]=useState(false);
  const [recImportTxt,setRecImportTxt]=useState("");
  const [recImpLoading,setRecImpLoading]=useState(false);
  const [recImpStatus,setRecImpStatus]=useState("");
  const [recParsed,setRecParsed]=useState([]);
  // Ingredient popup modal
  const [ingModal,setIngModal]=useState(false);
  const [ingEditIdx,setIngEditIdx]=useState(null); // null=add new, number=edit existing
  const [ingData,setIngData]=useState({food:"",quantity:"",unit:"g",...Object.fromEntries(ALL_FIELDS.map(f=>[f.key,""]))});
  const [ingAiMsg,setIngAiMsg]=useState("");
  const [ingLoading,setIngLoading]=useState(false);
  const ingNameRef=React.useRef(null);
  const ingQtyRef=React.useRef(null);
  const ingUnitRef=React.useRef(null);

  function openIngModal(idx=null){
    if(idx!==null){
      // Edit existing
      const item=recItems[idx];
      setIngData({...item});
      setIngEditIdx(idx);
    } else {
      // Add new
      setIngData({food:"",quantity:"",unit:"g",...Object.fromEntries(ALL_FIELDS.map(f=>[f.key,""]))});
      setIngEditIdx(null);
    }
    setIngAiMsg("");
    setIngModal(true);
    setTimeout(()=>ingNameRef.current&&ingNameRef.current.focus(),150);
  }

  async function doIngAiFill(){
    if(!ingData.food.trim()||!ingData.quantity){setIngAiMsg("⚠ Enter name and quantity first.");return;}
    setIngLoading(true);
    await doAI(ingData.food,ingData.quantity,ingData.unit,r=>setIngData(p=>({...p,...r})),s=>{setIngAiMsg(s);setIngLoading(false);});
    setIngLoading(false);
  }

  function saveIngModal(){
    if(!ingData.food.trim())return;
    if(ingEditIdx!==null){
      setRecItems(p=>p.map((x,i)=>i===ingEditIdx?{...ingData,_id:x._id}:x));
    } else {
      setRecItems(p=>[...p,{...ingData,_id:Date.now()}]);
    }
    setIngModal(false);
  }
  // Quick log from diary
  const [quickRecipe,setQuickRecipe]=useState(null);
  const [quickQtys,setQuickQtys]=useState({});
  // Reports
  const [repPeriod,setRepPeriod]=useState("daily");
  // Backup
  const [backupMsg,setBackupMsg]=useState("");

  const goals={
    calories:Number(profile.calorieGoal)||1800,protein:Number(profile.protein)||130,
    carbs:Number(profile.carbs)||180,fat:Number(profile.fat)||55,fiber:Number(profile.fiber)||25,
    sugar:Number(profile.sugar)||50,saturatedFat:Number(profile.saturatedFat)||20,
    polyFat:Number(profile.polyFat)||10,monoFat:Number(profile.monoFat)||15,
    cholesterol:Number(profile.cholesterol)||300,sodium:Number(profile.sodium)||2300,
    potassium:Number(profile.potassium)||3500,calcium:Number(profile.calcium)||1000,
    iron:Number(profile.iron)||18,vitC:Number(profile.vitC)||90,vitD:Number(profile.vitD)||20,
    vitB12:Number(profile.vitB12)||2.4,zinc:Number(profile.zinc)||11,
  };

  const pE=d=>{setEntries(d);store.set(SK.entries,d);};
  const pP=d=>{setProfile(d);setProfEdit(d);store.set(SK.profile,d);};
  const pW=d=>{setWeights(d);store.set(SK.weights,d);};
  const pRB=d=>{setRecipeBook(d);store.set(SK.recipes,d);};

  async function doAI(fname,q,u,onRes,onSt){
    const key=apiKey||HARDCODED_KEY;
    onSt("⏳ Looking up "+fname+"…");
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":key.trim(),"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:600,
          messages:[{role:"user",content:`Give nutrition for ${q} ${u} of ${fname}. Reply with ONLY this JSON object, no markdown:\n{"calories":0,"protein":0,"carbs":0,"fat":0,"saturatedFat":0,"polyFat":0,"monoFat":0,"cholesterol":0,"fiber":0,"sugar":0,"sodium":0,"potassium":0,"calcium":0,"iron":0,"vitC":0,"vitD":0,"vitB12":0,"zinc":0}\nReplace every 0 with correct numeric value.`}]})});
      const data=await res.json();
      if(data.error){onSt("⚠ API: "+data.error.message);return;}
      const raw=data.content?.map(b=>b.text||"").join("")||"";
      const p=JSON.parse(raw.replace(/```json|```/g,"").trim());
      const r={};
      ALL_FIELDS.forEach(f=>{const v=Number(p[f.key]);r[f.key]=isNaN(v)?"0":String(Math.round(v*10)/10);});
      onRes(r);onSt("✓ Filled — adjust if needed");
    }catch(e){onSt("⚠ Error: "+(e.message||"unknown"));}
  }

  // Diary helpers
  function addEntry(){
    if(!foodName.trim()||!nut.calories)return;
    const rid=`r_${Date.now()}`;
    const e={id:Date.now(),meal:addMeal,food:foodName.trim(),quantity:`${qty} ${unit}`,
      time:new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"}),
      recipeId:rid,recipeName:foodName.trim(),
      ...Object.fromEntries(ALL_FIELDS.map(f=>[f.key,Number(nut[f.key])||0]))};
    pE({...entries,[selDate]:[...(entries[selDate]||[]),e]});
    setFoodName("");setQty("");setUnit("g");setNut(emptyNut());setAiMsg("");setView("main");
  }
  function addParsed(){
    const toAdd=parsed.filter(i=>i.selected);if(!toAdd.length)return;
    const now=new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});
    const rid=`r_${Date.now()}`,rn=impName.trim()||"Imported Meal";
    const newEs=toAdd.map(x=>({id:Date.now()+Math.random(),meal:addMeal,food:x.food,
      quantity:`${x.quantity} ${x.unit||"g"}`,time:now,recipeId:rid,recipeName:rn,

      {view==="recipe-new"&&(

              <Btn onClick={doRecipeParse} disabled={recImpLoading||!recImportTxt.trim()} color={`linear-gradient(135deg,${C.accent},${C.accentDim})`} style={{marginBottom:6}}>{recImpLoading?"⏳ Parsing…":"🔍 Parse Ingredients"}</Btn>
              {recImpStatus&&<div style={{fontSize:11,marginBottom:10,textAlign:"center",color:recImpStatus.startsWith("✓")?C.green:recImpStatus.startsWith("⚠")?C.red:C.muted}}>{recImpStatus}</div>}
              {recParsed.length>0&&(
                <div style={{marginBottom:12}}>
                  {recParsed.map((item,idx)=>(
                    <div key={item._id} onClick={()=>setRecParsed(p=>p.map((x,i)=>i===idx?{...x,selected:!x.selected}:x))} style={{background:item.selected?C.card:C.bg,border:`1px solid ${item.selected?C.accent:C.border}`,borderRadius:9,padding:"9px 12px",marginBottom:7,cursor:"pointer",display:"flex",alignItems:"center",gap:10}}>
                      <div style={{width:16,height:16,borderRadius:4,flexShrink:0,border:`2px solid ${item.selected?C.accent:C.border}`,background:item.selected?C.accent:"none",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:C.bg,fontWeight:700}}>{item.selected?"✓":""}</div>
                      <div style={{flex:1}}><div style={{fontSize:12,fontWeight:600}}>{item.food}</div><div style={{fontSize:10,color:C.muted}}>{item.quantity}{item.unit||"g"} · {item.calories} kcal</div></div>
                    </div>

                </div>

                return(
                  <div key={item._id} onClick={()=>openIngModal(idx)} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"11px 13px",marginBottom:8,display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:600,marginBottom:2}}>{item.food}</div>
                      <div style={{fontSize:11,color:C.muted}}>{item.quantity} {item.unit} · <span style={{color:C.accent,fontFamily:"monospace"}}>{Math.round(rt.calories)} kcal</span> · P:{Math.round(rt.protein)}g C:{Math.round(rt.carbs)}g F:{Math.round(rt.fat)}g</div>
                    </div>
                    <button onClick={e=>{e.stopPropagation();setRecItems(p=>p.filter((_,i)=>i!==idx));}} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:7,color:C.muted,fontSize:12,cursor:"pointer",fontFamily:"inherit",padding:"4px 9px",flexShrink:0}}>✕</button>
                  </div>

              })}
            </div>
          )}
          {recAiMsg&&<div style={{fontSize:11,color:recAiMsg.startsWith("✓")?C.green:recAiMsg.startsWith("⚠")?C.red:C.muted,marginBottom:8,textAlign:"center"}}>{recAiMsg}</div>}
          <button onClick={()=>openIngModal(null)} style={{width:"100%",padding:"11px",background:"none",border:`1px dashed ${C.accent}`,borderRadius:10,color:C.accent,fontSize:13,cursor:"pointer",fontFamily:"inherit",marginBottom:12}}>+ Add Ingredient Manually</button>
          <Btn onClick={saveNewRecipe} disabled={!recName.trim()||!recItems.length} color={C.green}>{editRecId?"Update Recipe":"Save Recipe"}</Btn>

          {/* Ingredient Modal */}
          {ingModal&&(

                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                  <div style={{fontSize:16,fontWeight:700}}>{ingEditIdx!==null?"Edit Ingredient":"Add Ingredient"}</div>
                  <button onClick={()=>setIngModal(false)} style={{background:"none",border:"none",color:C.muted,fontSize:22,cursor:"pointer"}}>✕</button>
                </div>
                <div style={{marginBottom:12}}>
                  <Lbl>Ingredient Name</Lbl>
                  <input ref={ingNameRef} value={ingData.food}
                    onChange={e=>setIngData(p=>({...p,food:e.target.value}))}
                    placeholder="e.g. Egg, Chicken, Rice…" style={IS}
                    autoComplete="off" autoFocus/>

                <div style={{display:"flex",gap:6,marginBottom:10}}>
                  <div style={{flex:2}}>
                    <Lbl>Quantity</Lbl>
                    <input ref={ingQtyRef} value={ingData.quantity}
                      onChange={e=>setIngData(p=>({...p,quantity:e.target.value}))}
                      inputMode="decimal" placeholder="100" style={IS}/>
                  </div>
                  <div style={{flex:1}}>
                    <Lbl>Unit</Lbl>
                    <select ref={ingUnitRef} value={ingData.unit}
                      onChange={e=>setIngData(p=>({...p,unit:e.target.value}))}
                      style={IS}>
                      {["g","ml","oz","cup","tbsp","tsp","piece","serving"].map(u=><option key={u}>{u}</option>)}
                    </select>
                  </div>
                </div>
                {/* Unit quick-tap buttons */}
                <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:12}}>
                  {["g","ml","piece","tsp","tbsp","cup","oz","serving"].map(u=>(
                    <button key={u}
                      onClick={()=>{setIngData(p=>({...p,unit:u}));if(ingData.food.trim()&&ingData.quantity){setTimeout(doIngAiFill,50);}}}
                      style={{padding:"6px 12px",borderRadius:16,border:`1px solid ${ingData.unit===u?C.accent:C.border}`,background:ingData.unit===u?C.accent:"none",color:ingData.unit===u?C.bg:C.muted,fontSize:12,cursor:"pointer",fontFamily:"inherit",fontWeight:ingData.unit===u?700:400}}>
                      {u}
                    </button>
                  ))}
                </div>
                <Btn onClick={doIngAiFill} disabled={ingLoading||!ingData.food.trim()||!ingData.quantity}
                  color={`linear-gradient(135deg,${C.accent},${C.accentDim})`} style={{marginBottom:6}}>
                  {ingLoading?"⏳ Looking up…":"✨ AI Fill Nutrition"}
                </Btn>
                {ingAiMsg&&<div style={{fontSize:11,color:ingAiMsg.startsWith("✓")?C.green:C.red,marginBottom:10,textAlign:"center"}}>{ingAiMsg}</div>}
                <div style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:10,padding:12,marginBottom:14}}>
                  <div style={{fontSize:10,color:C.accent,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:8}}>Macronutrients</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:8}}>
                    {MACRO_FIELDS.map(({key,label,unit:u})=>(<div key={key}><div style={{fontSize:8,color:C.muted,marginBottom:2}}>{label}({u})</div><input value={ingData[key]||""} onChange={e=>setIngData(p=>({...p,[key]:e.target.value}))} type="number" placeholder="0" style={{...IS,padding:"6px 8px",fontSize:12,fontFamily:"monospace",color:Number(ingData[key])>0?C.accent:C.text}}/></div>))}
                  </div>
                  <div style={{fontSize:10,color:C.purple,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:8}}>Micronutrients</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:5}}>
                    {MICRO_FIELDS.map(({key,label,unit:u})=>(<div key={key}><div style={{fontSize:7,color:C.muted,marginBottom:2}}>{label}({u})</div><input value={ingData[key]||""} onChange={e=>setIngData(p=>({...p,[key]:e.target.value}))} type="number" placeholder="0" style={{...IS,padding:"5px 6px",fontSize:11,fontFamily:"monospace",color:Number(ingData[key])>0?C.green:C.text}}/></div>))}
                  </div>
                </div>
                <Btn onClick={saveIngModal} disabled={!ingData.food.trim()} color={C.green}>
                  {ingEditIdx!==null?"Save Changes":"Add to Recipe"}
                </Btn>
              </div>
            </div>
          )}
        </div>
      )}

      {/* RECIPE USE */}
      {view==="recipe-use"&&useRec&&(
        <div style={{padding:"16px 18px"}}>
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:16,marginBottom:14}}>
            <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>{useRec.name}</div>
            <div style={{fontSize:11,color:C.muted,marginBottom:14}}>Adjust quantities — nutrition scales automatically.</div>
            {useRec.items.map(item=>{
              const k=item._id??item.food,oQ=parseFloat(item.quantity)||1,nQ=parseFloat(useQtys[k])||oQ,ratio=nQ/oQ;
              return(
                <div key={k} style={{borderBottom:`1px solid ${C.border}`,paddingBottom:10,marginBottom:10}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                    <div style={{flex:1,fontSize:13,fontWeight:500}}>{item.food}</div>
                    <input value={useQtys[k]||""} onChange={e=>setUseQtys(p=>({...p,[k]:e.target.value}))} type="number" style={{...IS,width:70,flex:"none",padding:"6px 8px"}}/>
                    <span style={{fontSize:11,color:C.muted}}>{item.unit||"g"}</span>
                  </div>
                  <div style={{fontSize:11,color:C.muted}}><span style={{color:C.accent,fontFamily:"monospace"}}>{Math.round((Number(item.calories)||0)*ratio)}</span> kcal · P:{Math.round((Number(item.protein)||0)*ratio)}g · C:{Math.round((Number(item.carbs)||0)*ratio)}g · F:{Math.round((Number(item.fat)||0)*ratio)}g</div>
                </div>
              );
            })}
          </div>
          <div style={{marginBottom:14}}>
            <Lbl>Log to Meal {useRec.mealTags&&useRec.mealTags.length>0&&<span style={{color:C.accent}}>(tagged meals pre-selected)</span>}</Lbl>
            <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
              {MEAL_TYPES.map(m=><button key={m} onClick={()=>setUseMeal(m)} style={{padding:"7px 13px",borderRadius:20,fontSize:12,cursor:"pointer",fontFamily:"inherit",border:`1px solid ${useMeal===m?C.accent:C.border}`,background:useMeal===m?C.accent:"none",color:useMeal===m?C.bg:C.muted,fontWeight:useMeal===m?700:400}}>{MEAL_ICONS[m]} {m}</button>)}
            </div>
          </div>
          <Btn onClick={logRecipe} color={C.green}>Log Recipe to {useMeal}</Btn>
        </div>

      {/* REPORTS */}
      {tab==="reports"&&view==="main"&&(
        <div style={{padding:"16px 18px"}}>
          <div style={{display:"flex",background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:3,marginBottom:14,gap:3}}>
            {[{label:"Daily",val:"daily"},{label:"Weekly",val:"weekly"},{label:"Monthly",val:"monthly"}].map(({label,val})=>(
              <button key={val} onClick={()=>setRepPeriod(val)} style={{flex:1,padding:"9px",borderRadius:7,border:"none",cursor:"pointer",background:repPeriod===val?C.accent:"none",color:repPeriod===val?C.bg:C.muted,fontSize:13,fontFamily:"inherit",fontWeight:repPeriod===val?700:400}}>{label}</button>
            ))}
          </div>
          {repData.length===0?(
            <div style={{textAlign:"center",padding:"40px",color:C.muted}}>No data yet for this period.</div>
          ):(()=>{
            // Calculate period multiplier for goals
            const now=new Date();
            const daysInMonth=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
            const periodMult=repPeriod==="weekly"?7:repPeriod==="monthly"?daysInMonth:1;
            const periodGoals=Object.fromEntries(ALL_FIELDS.map(f=>[f.key,(goals[f.key]||0)*periodMult]));
            // For weekly/monthly: sum all data; for daily: avg
            const periodTotals=(()=>{
              if(repPeriod==="daily"){
                // Use today's actual entries
                return sumE(entries[todayStr()]||[]);
              } else {
                // Sum all entries in current week/month
                const ad=Object.keys(entries).sort();
                const cutDays=repPeriod==="weekly"?7:daysInMonth;
                const cutDate=new Date();cutDate.setDate(cutDate.getDate()-cutDays);
                const cutStr=cutDate.toISOString().split("T")[0];
                const inRange=ad.filter(d=>d>=cutStr);
                const allE=inRange.flatMap(d=>entries[d]||[]);
                return sumE(allE);
              }
            })();
            // Meal contribution totals for period
            const mealPeriodTotals=MEAL_TYPES.map(m=>{
              if(repPeriod==="daily"){
                return{meal:m,totals:sumE((entries[todayStr()]||[]).filter(e=>e.meal===m))};
              } else {
                const cutDays=repPeriod==="weekly"?7:daysInMonth;
                const cutDate=new Date();cutDate.setDate(cutDate.getDate()-cutDays);
                const cutStr=cutDate.toISOString().split("T")[0];
                const inRange=Object.keys(entries).filter(d=>d>=cutStr);
                return{meal:m,totals:sumE(inRange.flatMap(d=>(entries[d]||[]).filter(e=>e.meal===m)))};
              }
            }).filter(m=>m.totals.calories>0);

            const periodLabel=repPeriod==="daily"?"Today's Intake":repPeriod==="weekly"?"This Week Total":"This Month Total";
            const goalLabel=repPeriod==="daily"?"daily goal":repPeriod==="weekly"?"weekly goal (×7)":"monthly goal (×"+daysInMonth+" days)";
            return(
              <>
                {/* Achievement vs Goal */}
                <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:16,marginBottom:14}}>
                  <div style={{fontSize:13,fontWeight:600,marginBottom:2}}>Achievement vs Goal</div>
                  <div style={{fontSize:11,color:C.muted,marginBottom:14}}>{periodLabel} vs {goalLabel}</div>
                  {ALL_FIELDS.map(({key,label,unit:u,color})=>{
                    const g=periodGoals[key];if(!g)return null;
                    const val=periodTotals[key]||0;
                    const pct=Math.min(Math.round((val/g)*100),200);
                    const over=val>g;
                    const barColor=over?C.red:pct>=90?C.green:pct>=60?C.accent:C.muted;
                    const diff=val-g;
                    return(
                      <div key={key} style={{marginBottom:12}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                          <span style={{fontSize:11,color:C.text}}>{label}</span>
                          <div style={{display:"flex",alignItems:"center",gap:6}}>
                            <span style={{fontSize:10,color:C.muted,fontFamily:"monospace"}}>{val<1?val.toFixed(1):Math.round(val)}/{Math.round(g)}{u}</span>
                            <span style={{fontSize:10,fontFamily:"monospace",fontWeight:700,color:over?C.red:pct>=90?C.green:C.accent,background:over?"rgba(224,82,82,0.12)":pct>=90?"rgba(82,196,122,0.12)":"rgba(232,197,71,0.12)",padding:"1px 6px",borderRadius:5}}>{pct}%</span>
                            <span style={{fontSize:9,color:over?C.red:C.green,fontFamily:"monospace"}}>{diff>0?"+":""}{diff<1&&diff>-1?diff.toFixed(1):Math.round(diff)}{u}</span>
                          </div>
                        </div>
                        <div style={{height:5,background:C.border,borderRadius:3,overflow:"hidden"}}>
                          <div style={{height:"100%",width:`${Math.min(pct,100)}%`,background:barColor,borderRadius:3,transition:"width 0.4s ease"}}/>
                        </div>
                      </div>
                    );
                  })}
                </div>

                {/* Meal Contribution */}
                <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:16,marginBottom:14}}>
                  <div style={{fontSize:13,fontWeight:600,marginBottom:2}}>Meal Contribution</div>
                  <div style={{fontSize:11,color:C.muted,marginBottom:14}}>{repPeriod==="daily"?"Today's meals vs daily goal":repPeriod==="weekly"?"This week's meals vs weekly goal":"This month's meals vs monthly goal"}</div>
                  {mealPeriodTotals.length===0?<div style={{color:C.muted,fontSize:12}}>No meal data for this period.</div>:mealPeriodTotals.map(({meal,totals})=>(
                    <div key={meal} style={{marginBottom:16}}>
                      <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:8}}>
                        <span>{MEAL_ICONS[meal]}</span>
                        <span style={{fontSize:12,fontWeight:600}}>{meal}</span>
                        <span style={{fontSize:11,color:C.accent,fontFamily:"monospace",marginLeft:"auto"}}>
                          {Math.round(totals.calories)} kcal
                          <span style={{fontSize:10,color:C.muted}}> ({Math.round((totals.calories/periodGoals.calories)*100)}% of goal)</span>
                        </span>
                      </div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
                        {[{key:"protein",label:"Protein",color:C.blue},{key:"carbs",label:"Carbs",color:C.orange},{key:"fat",label:"Fat",color:C.accentDim},{key:"fiber",label:"Fiber",color:C.green},{key:"sodium",label:"Sodium",color:C.purple},{key:"calcium",label:"Calcium",color:C.purple}].map(({key,label,color})=>{
                          const pct=periodGoals[key]?Math.round((totals[key]/periodGoals[key])*100):0;
                          const fld=ALL_FIELDS.find(f=>f.key===key);
                          return(
                            <div key={key} style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 9px"}}>
                              <div style={{fontSize:9,color:C.muted,marginBottom:2}}>{label}</div>
                              <div style={{fontSize:12,fontWeight:700,fontFamily:"monospace",color}}>{pct}%</div>
                              <div style={{fontSize:9,color:C.muted}}>{totals[key]<1?totals[key].toFixed(1):Math.round(totals[key])}{fld?.unit||"g"}</div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  ))}
                </div>
              </>
            );
          })()}
        </div>
      )}

      {/* BOTTOM NAV */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:C.bg,borderTop:`1px solid ${C.border}`,display:"flex",zIndex:20,paddingBottom:"env(safe-area-inset-bottom,0)"}}>
        {TABS.map(({id,icon,label})=>(
          <button key={id} onClick={()=>{setTab(id);setView("main");setEditRecId(null);}} style={{flex:1,padding:"11px 0 13px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            <span style={{fontSize:20}}>{icon}</span>
            <span style={{fontSize:10,letterSpacing:"0.06em",textTransform:"uppercase",color:tab===id?C.accent:C.muted,fontWeight:tab===id?700:400,fontFamily:"inherit"}}>{label}</span>
          </button>
        ))}
      </div>
      {tab==="diary"&&view==="main"&&(
        <button onClick={()=>setView("add")} style={{position:"fixed",bottom:80,right:18,width:56,height:56,borderRadius:"50%",background:`linear-gradient(135deg,${C.accent},${C.accentDim})`,border:"none",color:C.bg,fontSize:26,cursor:"pointer",boxShadow:"0 4px 20px rgba(232,197,71,0.4)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>+</button>
      )}
    </div>
  );
}
ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
<button id="install-banner" style="display:none">
  <img src="icon-192.png" alt="Food Journal"/>
  <div class="txt"><strong>Install Food Journal</strong><span>Add to home screen</span></div>
  <span class="arrow">📲</span>
  <button id="install-dismiss">✕</button>
</button>
<script>
let dp=null;
const bn=document.getElementById('install-banner');
const dm=document.getElementById('install-dismiss');
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();dp=e;setTimeout(()=>bn.classList.add('show'),2000);});
bn.addEventListener('click',async e=>{if(e.target===dm||dm.contains(e.target)){bn.classList.remove('show');return;}if(!dp)return;bn.classList.remove('show');dp.prompt();await dp.userChoice;dp=null;});
dm.addEventListener('click',e=>{e.stopPropagation();bn.classList.remove('show');});
window.addEventListener('appinstalled',()=>{bn.classList.remove('show');dp=null;});
if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>{});});}
</script>
</body>
